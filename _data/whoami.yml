# _data/whoami.yml
#
# Campos usados pelo prompt de identificação universal (greeting.js).

# Comando exibido antes da saudação.
hello_cmd: "cat hello_world.txt"

# Texto exibido na saída do cat. Suporta @mentions.
hello_txt: |
  Primeiro acesso detectado. Olá usuário!
  Informe um nome pra continuar.

# Texto do prompt de nome ("export USER=nome").
prompt_cmd: "export USER="

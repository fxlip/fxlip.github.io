# _data/whoami.yml
#
# Mensagens da home exibidas na saída de "whoami && cat dog.txt".
# Ordenadas do maior rep para o menor — o JS seleciona a primeira
# entrada onde rep >= min.
#
# Variáveis disponíveis: {{name}}, {{visits}}, {{time}}, {{city}},
#                        {{comments}}, {{upvotes}}, {{rep}}, {{days}}
# Gênero: use % como sufixo (obrigad% → obrigado/obrigada/obrigade)
# @mentions são processadas automaticamente.

messages:
  - min: 350
    dog_txt: |
      Escrevo sobre @linux e @infosec.
      Também dou meus 2kb de opinião.

      {{days}} dias · {{visits}} visitas · {{time}} aqui dentro.
      {{comments}} comentários · {{upvotes}} upvotes.
      Veteran% de carteirinha. Respeito.
      rep: {{rep}}

  - min: 150
    dog_txt: |
      Escrevo sobre @linux e @infosec.
      Também dou meus 2kb de opinião.

      {{days}} dias · {{visits}} visitas · {{time}} lendo.
      {{comments}} comentários · {{upvotes}} upvotes dados.
      Você virou parte disso. Obrigad%.
      rep: {{rep}}

  - min: 60
    dog_txt: |
      Escrevo sobre @linux e @infosec.
      Também dou meus 2kb de opinião.

      {{visits}} visitas · {{time}} aqui dentro.
      Claramente vici%. Sem julgamentos.
      rep: {{rep}}

  - min: 15
    dog_txt: |
      Escrevo sobre @linux e @infosec.
      Também dou meus 2kb de opinião.

      {{visits}} visitas. Já tá virando frequentador%.
      Você veio de {{city}} — bom gosto.

  - min: 0
    dog_txt: |
      Escrevo sobre @linux e @infosec.
      Também dou meus 2kb de opinião.

      Primeira vez por aqui? Seja bem-vind%.
      Dá uma olhada no @feed — tem coisa boa.

- id: "108-063"
  topic: "108.2"
  type: "discursive"
  question: "Qual comando tem a função de examinar os logs do journal do serviço systemd? (Informe apenas o nome do comando, sem o caminho ou argumentos)"
  answer: "journalctl"
  comment: "O serviço systemd possui um registro de logs específico chamado de journal e o comando journalctl é a ferramenta desenhada especificamente para consultar esses registros. #journalctl #systemd #journal"


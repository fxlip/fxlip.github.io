- id: "106-001"
  topic: "106.1"  
  question: "Qual programa é usado para ajustar as configurações da tela após instalar o X11?"
  options:
    - "tuneX"
    - "xvidtune"
    - "video"
    - "vconfig"
    - "vtune"
  answer: 2
  comment: "O xvidtune é uma ferramenta legada para ajustar as \"modelines\" de vídeo no servidor X11. Ele permite sintonizar finamente as frequências de sincronização vertical e horizontal para alinhar a imagem perfeitamente no monitor. #X11 #xvidtune"

- id: "106-002"
  topic: "106.1"  
  question: "Você deseja conectar um terminal X11 ao seu servidor. Mas toda vez que você tenta conectar, a tela do seu terminal continua preta. Quais arquivos no servidor você editaria para resolver o problema?"
  options:
    - "/etc/X11/XF86Config"
    - "/etc/X11/xdm/x-terminals"
    - "/etc/X11/xdm/xdm-config"
    - "/etc/X11/xdm/Xwilling"
    - "/etc/X11/xdm/Xaccess"
  answer: [3, 5]
  comment: "Para que um terminal remoto use o XDMCP (X Display Manager Control Protocol), o servidor precisa estar ouvindo. No xdm-config, você deve comentar a linha que desativa o listen (geralmente DisplayManager.requestPort: 0). No Xaccess, você define quais hosts têm permissão para solicitar uma tela de login. #XDMCP #X11"

- id: "106-003"
  topic: "106.1"
  type: "discursive"
  question: "Você deseja executar uma aplicação X na sua máquina local, mas ela deve ser exibida no primeiro servidor de exibição de foo. O comando é \"xapplication -display __________\" (Não use números de tela)"
  answer: "foo:0"
  comment: "A sintaxe do display no X11 segue o padrão hostname:display_number.screen_number. Como a questão pede o primeiro servidor de exibição (0) e proíbe o número da tela (o que vem depois do ponto), o preenchimento correto é apenas o nome do host seguido de :0. #X11 #DISPLAY"

- id: "106-004"
  topic: "106.1"
  question: "Nas configurações do arquivo xorg.conf, qual seção irá conter informações referentes à resolução da tela?"
  options:
    - "Na seção Monitor, opção Modeline"
    - "Na seção Device, opção Modeline"
    - "Na seção Screen, opção Resolution"
    - "Na seção Screen, Sub-Seção Display, opção Modes"
    - "Na seção ServerLayout, Sub-Seção Screen, opção Resolution"
  answer: 4
  comment: "A seção 'Screen' é onde ocorre o vínculo entre o Monitor e o Device (placa de vídeo). Dentro dela, a subseção 'Display' define as profundidades de cor e a opção 'Modes' especifica as resoluções de tela suportadas. #Xorg #X11 #DISPLAY"

- id: "106-005"
  topic: "106.1"
  question: "A variável de ambiente DISPLAY definida com valor 10.0.0.50:1.0 determina que:"
  options:
    - "As janelas serão exibidas no segundo display da máquina 10.0.0.50"
    - "As janelas serão exibidas no primeiro display da máquina 10.0.0.50"
    - "O servidor X será iniciado na máquina 10.0.0.50"
    - "A versão do servidor em execução na máquina 10.0.0.50 é a 1.0"
    - "A variável de ambiente DISPLAY não tem relação com o servidor X."
  answer: 1
  comment: "A variável DISPLAY segue o formato 'hostname:número_do_servidor.número_da_tela'. Como a contagem inicia em 0, o valor ':1' indica o segundo servidor gráfico (display) da máquina. #DISPLAY #X11 #env"

- id: "106-006"
  topic: "106.1"
  question: "Qual dos seguintes comandos faz com o que o servidor X11 do Linux aceite as conexões vindas do servidor server1.domain.com?"
  options:
    - "export DISPLAY=server1.domain.com:0.0"
    - "xhost server1.domain.com"
    - "xhost +server1.domain.com"
    - "xaccess +server1.domain.com"
    - "Xorg -connect server1.domain.com"
  answer: 3
  comment: "O comando xhost controla o acesso ao servidor X baseado em hosts. O prefixo '+' concede permissão explicitamente ao host especificado. Sem argumentos, o xhost lista as permissões atuais. #xhost #X11"

- id: "106-007"
  topic: "106.3"
  question: "Qual configuração de acessibilidade cria um delay ao se pressionar uma mesma tecla pela segunda vez, ignorando repetições rápidas?"
  options:
    - "Slow Keys"
    - "Bounce Keys"
    - "Delay Keys"
    - "Sticky Keys"
    - "On-Screen Keyboard"
  answer: 2
  comment: "O recurso Bounce Keys (Teclas de Repercussão) ignora pressões repetidas da mesma tecla em um curto intervalo de tempo. Diferente dele, o Sticky Keys permite acionar teclas modificadoras sequencialmente, e o Slow Keys exige que a tecla seja mantida pressionada por um tempo mínimo. #X11 #BounceKeys"

- id: "106-008"
  topic: "106.1"
  question: "Qual o componente de um Desktop Environment responsável por fazer o gerenciamento das janelas?"
  options:
    - "Display Manager"
    - "GUI"
    - "Wayland"
    - "Window Manager"
    - "DE"
  answer: 4
  comment: "O Window Manager (Gerenciador de Janelas) é o componente que controla a aparência e o posicionamento das janelas. Exemplos incluem Mutter (GNOME), KWin (KDE) e Xfwm (Xfce). #windowmanager #X11"

- id: "106-009"
  topic: "106.1"
  question: "Qual arquivo presente no $HOME do usuário conterá informações e logs referentes à sua sessão no servidor X11, podendo ser utilizado para se identificar causas de algum erro?"
  options:
    - "$HOME/.Xerrors"
    - "$HOME/.Xauthority"
    - "$HOME/.Xlogs"
    - "$HOME/.xsession-errors"
  answer: 4
  comment: "O arquivo ~/.xsession-errors armazena mensagens de erro, avisos e logs de aplicativos executados durante a sessão gráfica do usuário. É o primeiro lugar onde um administrador deve olhar quando um aplicativo GUI falha em iniciar ou fecha inesperadamente. #xsession-errors #X11"

- id: "106-010"
  topic: "106.2"
  question: "Qual das opções abaixo NÃO é um Desktop Environment?"
  options:
    - "KDE"
    - "Gnome"
    - "Wayland"
    - "Xfce"
    - "MATE"
  answer: 3
  comment: "Wayland não é um ambiente de desktop, mas sim um protocolo que especifica a comunicação entre o servidor gráfico (compositor) e seus clientes, visando substituir o X11. KDE, Gnome, Xfce e MATE são Desktop Environments completos. #wayland #X11"

- id: "106-011"
  topic: "106.1"
  question: "Você deseja configurar sua sessão do bash para que todas as janelas de aplicações gráficas que iniciar, ao invés de serem abertas em sua própria máquina, sejam abertas no servidor X da máquina remota de IP 10.0.0.100. Considerando que esta máquina remota esteja aceitando essas conexões, qual comando você deve executar para definir essa configuração na sua máquina?"
  options:
    - "xhost +10.0.0.100"
    - "export DISPLAY=10.0.0.100:0.0"
    - "export SCREEN=10.0.0.100"
    - "xwin -d 10.0.0.100"
  answer: 2
  comment: "A variável de ambiente DISPLAY define aonde serão exibidas as janelas do ambiente gráfico, deve ser definida com o IP do destino e exportada. #DISPLAY #X11 #env"

- id: "106-012"
  topic: "106.3"
  question: "Das opções abaixo, quais são recursos de acessibilidade disponibilizados em ambientes gráficos no Linux? (Selecione TRÊS Respostas Corretas)"
  options:
    - "Repeat keys"
    - "Spice"
    - "Mouse Keys"
    - "Screen Reader"
    - "xauth"
  answer: [1, 3, 4]
  comment: "O Repeat Keys permite controlar a entrada repetida de um caractere que é mantido pressionado pelo usuário. O Mouse keys permite o uso do ponteiro do mouse pelo teclado e o Screen Reader permite que o texto que aparece na tela seja lido. #X11"

- id: "106-013"
  topic: "106.2"
  question: "Qual é o protocolo de acesso remoto nativo do servidor X11?"
  options:
    - "Spice"
    - "RDP"
    - "RFB"
    - "XDMCP"
  answer: 4
  comment: "O XDMCP (X Display Manager Control Protocol) é implementado pelo display manager. O protocolo é simples, sem recursos de compressão ou criptografia. #XDMCP #X11 #DisplayManager"

- id: "106-014"
  topic: "106.1"
  question: "Em qual seção do arquivo de configuração do servidor X são definidas as propriedades aplicadas para o Teclado e Mouse?"
  options:
    - "ServerLayout"
    - "GeneralSettings"
    - "Device"
    - "InputDevice"
  answer: 4
  comment: "Na seção InputDevice, especificações sobre o mouse e teclado podem ser realizadas. Outras seções importantes são: \"Files\" – Caminhos para alguns arquivos importantes, principalmente o FontsPath. \"ServerLayout\" – Configurações Gerais do Servidor X. \"Module\" – Carregamento de módulos extras. \"Monitor\" – Configuração do monitor utilizado. \"Device\" – Configuração da placa de vídeo e driver. \"Screen\" – Combinação do Monitor com o Device, principalmente configuração da resolução da tela. #Xorg #InputDevice #X11"

- id: "106-015"
  topic: "106.1"
  question: "Qual componente do Desktop Environment é responsável pela interface que possibilita o login dos usuários no ambiente?"
  options:
    - "Display Manager"
    - "Login Manager"
    - "GUI"
    - "Window Manager"
  answer: 1
  comment: "O Display Manager é o responsável por controlar a interface gráfica de login no ambiente gráfico, a tela inicial em que é informado o usuário e a senha. Como exemplo temos o LightDM, GDM, XDM, LXDM e etc. #DisplayManager #login #X11"

- id: "106-016"
  topic: "106.3"
  question: "Em um servidor X, qual a finalidade do recurso \"Sticky Keys\"?"
  options:
    - "Impedir que um mesmo caractere seja incluído múltiplas vezes quando a tecla for continuamente pressionada."
    - "Auxiliar usuários que possuem dificuldades em pressionar mais de uma tecla ao mesmo tempo."
    - "Aumentar o tamanho das letras na tela do terminal."
    - "Possibilitar o uso, através de um mouse, de um teclado virtual que é exibido na tela."
  answer: 2
  comment: "O recurso de Sticky Keys ajuda usuários que possuem dificuldades em pressionar mais de uma tecla ao mesmo tempo. #StickyKeys #X11"

- id: "106-017"
  topic: "106.2"
  question: "Dentre as opções abaixo, quais são Desktop Environments utilizados junto a sistemas GNU/Linux? (Selecione TRÊS Respostas Corretas)"
  options:
    - "XDM"
    - "Xfce"
    - "KDE"
    - "MInt"
    - "GNOME"
  answer: [2, 3, 5]
  comment: "GNOME, KDE e Xfce são Desktop Environments, além destas temos LXDE, MATE, Cinnamon e vários outras. XDM é um Display Manager e Mint vem da distribuição Linux Mint, o que é diferente de um DE. #GNOME #KDE #Xfce"

- id: "106-018"
  topic: "106.1"
  question: "O administrador deseja configurar o servidor X da máquina 192.168.8.10 para ele aceite conexões vindas da máquina de IP 192.168.8.55. Qual comando deve ser utilizado na máquina que vai receber estas conexões?"
  options:
    - "DISPLAY=192.168.8.55:0.0"
    - "DISPLAY=192.168.8.10:0.0"
    - "xhost +192.168.8.10"
    - "xhost +192.168.8.55"
  answer: 4
  comment: "O comando xhost é utilizado para definir quais origens podem acessar o servidor X da máquina. Sem argumentos ele exibe as configurações atuais. #xhost #X11"

- id: "106-019"
  topic: "106.1"
  type: "discursive"
  question: "Ao utilizar o recurso de redirecionamento X11 no SSH, qual variável de ambiente será definida automaticamente na máquina remota para possibilitar essa conexão? (Informe apenas o nome da variável)"
  answer: "DISPLAY"
  comment: "A variável de ambiente DISPLAY será configurada com a informação da localização do servidor X que será utilizado na conexão. #DISPLAY #X11 #SSH"

- id: "106-020"
  topic: "106.3"
  question: "Qual configuração de Acessibilidade do ambiente gráfico impede que caso a mesma tecla seja pressionada repetidamente, em um curto espaço de tempo, ela seja impressa de maneira repetida em um documento?"
  options:
    - "Bounce Keys"
    - "Sticky Keys"
    - "Repeated Keys"
    - "Toggle Keys"
  answer: 1
  comment: "Com o \"Bounce Keys\" habilitado, se o usuário pressionar a mesma teclas duas ou mais vezes rapidamente, a tecla será registrada apenas uma vez. O \"Sticky Keys\" é utilizado para o caso do usuário não ser capaz de pressionar duas teclas ao mesmo tempo. #BounceKeys #X11"

- id: "106-021"
  topic: "106.2"
  question: "Dos protocolos abaixo, qual é utilizado para acessos remotos a desktops gráficos de maneira segura, com o uso de encriptação?"
  options:
    - "SMB"
    - "XDMCP"
    - "SPICE"
    - "XDP"
    - "VNC"
  answer: 3
  comment: "O XDMCP (X Display Manager Control Protocol) é o protocolo nativo do X11. O SPICE (Simple Protocol for Independent Computing Environment) é uma solução completa e segura para acesso remoto. O VNC não é um protocolo, é uma aplicação que utiliza o protoclo RFB (Remote FrameBuffer). #SPICE #XDMCP #VNC"

- id: "106-022"
  topic: "106.1"
  type: "discursive"
  question: "Qual o nome padrão do arquivo de configuração do servidor X11? (Informe apenas o nome do arquivo, sem o caminho completo)"
  answer: "xorg.conf"
  comment: "O Xorg X11 tem como principal arquivo de configuração o /etc/xorg.conf. #xorg.conf #X11 #Xorg"

- id: "106-023"
  topic: "106.1"
  question: "Quais comandos são utilizados para exibir e editar informações de autorização de acesso ao servidor X? (Selecione DUAS Respostas Corretas)"
  options:
    - "xaccess"
    - "xhost"
    - "xauth"
    - "xauthority"
    - "Xorg"
  answer: [2, 3]
  comment: "O xhost é utilizado para listar, adicionar e remover IP, Redes, ou Host que podem ou não fazer o acesso remoto ao servidor X. O xauth permite esse controle baseado em hashs, ou magic cookies, que são armazenados no arquivo ~/.Xauthority. #xhost #xauth #X11"

- id: "106-024"
  topic: "106.2"
  question: "Qual solução de acesso remoto permite que os clientes acessem diretamente as informações dos dispositivos USB presentes no servidor?"
  options:
    - "XDMCP"
    - "VNC"
    - "Spice"
    - "mutter"
  answer: 3
  comment: "Um dos recursos do Spice é o \"USB Redirection\", que permite que os clientes utilizem os dispositivos USB dos servidores. #SPICE #USB"

- id: "106-025"
  topic: "106.3"
  question: "Qual aplicação provê um recurso de acessibilidade que reproduz um teclado na tela do usuário?"
  options:
    - "Orca"
    - "GOK"
    - "Kmag"
    - "BRLTTY"
  answer: 2
  comment: "O GOK (Gnome On-Screen Keyboard) é um software que implementa um teclado virtual via interface gráfica permitindo que o usuário possa inserir texto utilizando o mouse. #GOK"


- id: "104-001"
  topic: "104.1"  
  question: "Como você poderia verificar a integridade de um sistema de arquivos não montado /dev/hdb7, mesmo que ele tenha uma marcação de \"limpo\" (cleanflag) válida?"
  options:
    - "chkdsk /dev/hdb7"
    - "fsck /dev/hdb7"
    - "hdcheck --force /dev/hdb7"
    - "fsck -f /dev/hdb7"
    - "fschk -f /dev/hdb7"
  answer: 4
  comment: "O comando fsck por padrão ignora sistemas de arquivos marcados como \"limpos\" para economizar tempo. A flag -f (force) ignora o estado do cleanflag e realiza uma verificação completa e minuciosa de toda a estrutura de inodes e blocos. #fsck"

- id: "104-002"
  topic: "104.3"  
  question: "Você criou um novo diretório chamado /foo e copiou dois arquivos, bar e foobar, para dentro dele. Agora, você monta um disquete em /foo usando o comando mount /dev/fd0 /foo. O que acontece com os arquivos se você usar o comando rm -rf /foo/* e depois umount /foo?"
  options:
    - "Eles são removidos."
    - "Eles são removidos, mas você pode restaurá-los."
    - "Não é possível montar um disquete em um diretório que não esteja vazio."
    - "Nada. Eles ainda estão lá."
    - "Os nomes aparecem no diretório, mas os inodes são excluídos."
  answer: 4
  comment: "Quando você monta um sistema de arquivos em um diretório que já contém arquivos, o conteúdo original fica \"mascarado\" (escondido) pelo novo sistema de arquivos. O comando rm -rf /foo/* deletará apenas o que está no disquete. Ao desmontar, os arquivos originais reaparecem intactos. #mount"

- id: "104-003"
  topic: "104.4"  
  question: "Como você poderia obter a informação de qual tipo de cota está ativada para o usuário foo?"
  options:
    - "repquota foo"
    - "repquota --user foo"
    - "quota foo"
    - "quota --user foo"
    - "quotainfo foo"
  answer: 3
  comment: "O comando quota exibe os limites e o uso atual de disco para um usuário ou grupo. Ao passar o nome do usuário como argumento (quota foo), o sistema reporta as restrições impostas a essa conta específica em todos os sistemas de arquivos montados com suporte a cotas. #quota"

- id: "104-004"
  topic: "104.5"
  type: "discursive"
  question: "Qual o valor numérico do modo de permissão -rwxr-sr--?"
  answer: "2754"
  comment: "As permissões padrão são 754 (rwx=7, r-x=5, r--=4). O \"s\" no campo do grupo indica o bit especial SetGID ativado sobre uma permissão de execução (s minúsculo = x presente). O SetGID tem valor 2 no primeiro dígito da representação de quatro oitais. #chmod"

- id: "104-005"
  topic: "104.5"  
  question: "Como você poderia ajudar os usuários a criarem arquivos com permissões de arquivo rigorosas?"
  options:
    - "Ensinar os usuários a usar o chmod."
    - "Usar uma configuração de umask rigorosa no perfil do usuário."
    - "Alterar as permissões de diretório do usuário."
    - "Usar o cron para alterar as permissões dos arquivos dos usuários uma vez por dia."
    - "Usar substitutos para as ferramentas padrão do Unix que criam arquivos seguros."
  answer: 2
  comment: "O umask (User Mask) define as permissões padrão que serão subtraídas (mascaradas) no momento da criação de qualquer novo arquivo ou diretório. Configurar um umask como 0077 no .bash_profile ou /etc/profile, por exemplo, garante que apenas o dono tenha acesso aos arquivos criados, sem depender de ação manual posterior. #umask"

- id: "104-006"
  topic: "104.5"  
  question: "Como você poderia alterar o proprietário do arquivo foobar para o usuário foo?"
  options:
    - "chown foo:foobar"
    - "chown foobar foo"
    - "chown foo foobar"
    - "chmod --user foo foobar"
    - "chperm --user foo --file foobar"
  answer: 3
  comment: "O comando chown (change owner) segue a sintaxe básica chown [NOVO_DONO] [ARQUIVO]. Ele permite alterar o proprietário e, opcionalmente, o grupo de um arquivo ou diretório. Somente o superusuário (root) pode alterar o dono de um arquivo para outro usuário. #chown"

- id: "104-007"
  topic: "104.6"  
  question: "No diretório /home/foo existe um arquivo chamado bar que é um link simbólico para o arquivo foobar no mesmo diretório, criado com o comando ln -s foobar bar. Se você copiar o link para /tmp usando o comando cp -d /home/foo/bar /tmp, o que aconteceria?"
  options:
    - "A destino /tmp/bar é um link simbólico para /tmp/foobar"
    - "A destino /tmp/bar é um link simbólico para /home/foo/foobar"
    - "A destino /tmp/bar é um arquivo regular com o mesmo conteúdo que /home/foo/foobar"
    - "A destino /tmp/bar é um hardlink usando o mesmo inode que /home/foo/foobar"
    - "A destino /tmp/bar é um hardlink usando o mesmo inode que /home/foo/bar"
  answer: 1
  comment: "O comando ln -s foobar bar cria um link simbólico relativo. O arquivo bar contém apenas a string \"foobar\". A opção -d (ou --no-dereference) do comando cp garante que o link seja copiado como um link, preservando seu conteúdo literal. Como o conteúdo é \"foobar\", ao ser movido para /tmp, o sistema tentará resolver esse nome dentro do novo diretório. #symlink"

- id: "104-008"
  topic: "104.7"
  type: "discursive"
  question: "Qual diretório contém a maioria dos arquivos de configuração do sistema? Insira o caminho completo."
  answer: "/etc"
  comment: "De acordo com o FHS (Filesystem Hierarchy Standard), o diretório /etc é o local centralizado para todos os arquivos de configuração estáticos do sistema. Ele não deve conter binários executáveis. #etc #fhs"

- id: "104-009"
  topic: "104.2"
  question: "Que afirmativa sobre o comando \"du\" é verdadeira?"
  options:
    - "Dump User - backup dos arquivos dos usuários."
    - "DOS to Unix - Muda os arquivos do formato MS-DOS para UNIX"
    - "Dos Utility - Ferramenta para acesso de discos MS-DOS."
    - "Disk Usage - Mostra a quantidade de disco utilizada"
    - "Dir User - Mostra os diretórios dos usuários."
  answer: 4
  comment: "O comando du (Disk Usage) estima e exibe o espaço em disco usado por arquivos e diretórios específicos. Diferente do df, que lê os blocos livres do sistema de arquivos, o du percorre a árvore de diretórios somando o tamanho de cada arquivo recursivamente. #du #diskusage"

- id: "104-010"
  topic: "104.7"
  question: "Em um sistema com partições separadas /, /usr, /var, /tmp, quais delas podem seguramente ser montadas como somente leitura?"
  options:
    - "/usr"
    - "/usr, /, /tmp"
    - "/var"
    - "/tmp"
    - "/var, /usr"
  answer: 1
  comment: "De acordo com o FHS (Filesystem Hierarchy Standard), o diretório /usr contém dados estáticos do sistema compartilháveis e imutáveis durante a operação normal (como binários e bibliotecas). Portanto, pode ser montado como read-only (ro) na rede ou localmente por segurança. Já partições como /var (logs, spools) e /tmp (arquivos temporários) exigem gravação constante (rw). #fhs #mount"

- id: "104-011"
  topic: "104.2"
  question: "Considere a linha seguinte. Deseja-se saber qual o comando que a produziu: /dev/hda8 1.9G 559M 1.2G 30% /home"
  options:
    - "df -m"
    - "du -k"
    - "df -h"
    - "df -k"
    - "du -s"
  answer: 3
  comment: "A saída apresenta sufixos de unidade como 'G' (Gigabytes) e 'M' (Megabytes), o que caracteriza o uso da flag -h (human-readable). O comando df (disk free) é o responsável por exibir o uso de espaço por sistema de arquivos montado, incluindo o ponto de montagem (/home). #df #storage"

- id: "104-012"
  topic: "104.2"
  question: "Qual dos comandos seguintes pode ser usado para conferir um sistema de arquivos ext2? Selecione todas as alternativas que sejam aplicáveis."
  options:
    - "fsck /dev/hda5"
    - "fsck.ext2 /dev/hda5"
    - "fsck -ext2 /dev/hda5"
    - "e2fsck /dev/hda5"
    - "fsck.linux /dev/hda5"
  answer: [1, 2, 4]
  comment: "O utilitário fsck funciona como um wrapper que identifica o tipo de sistema de arquivos e chama o binário específico (fsck.ext2). O comando e2fsck é o utilitário nativo específico para a família ext (ext2/3/4). #fsck #ext2 #e2fsck"

- id: "104-013"
  topic: "104.1"
  question: "Você quer alterar as cotas de um usuário. Como fazer isso?"
  options:
    - "Usar o comando addquota usuário"
    - "Usar o comando edquota usuário"
    - "Usar o comando repquota"
    - "Editar a linha /home em /etc/fstab"
    - "Editar o arquivo /home/quota.user"
  answer: 2
  comment: "O comando edquota (Edit Quota) abre o editor de texto padrão (geralmente vi ou nano) com os limites de blocos e inodes do usuário específico, permitindo a alteração manual das cotas soft e hard. #quota #edquota #limits"

- id: "104-014"
  topic: "104.1"
  question: "Qual das opções seguintes corresponde aos resultados comando: # chmod g+s /home/software?"
  options:
    - "O bit SGID será habilitado para /home/software para manter as permissões do grupo do diretório consistente para todos os arquivos criados."
    - "O sticky bit será habilitado para /home/software."
    - "O bit SGID será habilitado para /home/software, prevenindo acesso por não membros do grupo de software."
    - "O sticky bit será aplicado a todos os arquivos dentro de /home/software."
    - "O bit SUID será habilitado para /home/software."
  answer: 1
  comment: "Quando o bit SGID (Set Group ID) é aplicado a um diretório (g+s), todos os novos arquivos e subdiretórios criados dentro dele herdarão automaticamente o grupo proprietário do diretório pai, em vez do grupo primário do usuário que o criou. Isso é fundamental para diretórios de colaboração. #permissions #sgid #chmod"

- id: "104-015"
  topic: "104.1"
  question: "Qual o comando utilizado para criar uma partição de swap?"
  options:
    - "activeswap"
    - "swapon"
    - "mkswap"
    - "mkfs -t swap"
    - "initswap"
  answer: 3
  comment: "O comando 'mkswap' (make swap) é o responsável por preparar uma partição ou arquivo para ser utilizado como área de troca (swap), gravando a assinatura necessária. O comando 'swapon' apenas ativa uma área que já foi preparada pelo mkswap. #swap #mkswap #memory"

- id: "104-016"
  topic: "104.1"
  question: "O comando umask 027 configura qual permissão padrão para criação de novos arquivos?"
  options:
    - "1640"
    - "1027"
    - "640"
    - "750"
    - "27"
  answer: 3
  comment: "A máscara umask subtrai permissões da permissão base (666 para arquivos, 777 para diretórios). Para um arquivo: 666 - 027 resulta em 640 (rw-r-----). O dono tem leitura/escrita, o grupo apenas leitura e outros não têm acesso. #umask #permissions #640"

- id: "104-017"
  topic: "104.1"
  question: "Um sistema de arquivos ext2 é configurado com cotas de usuário habilitadas. O limite soft é fixo em 100 MB por usuário, o limite hard é fixo em 110 MB por usuário, e o período de graça é de sete dias. O usuário João já possui 90 MB dos dados armazenados no sistema. O que acontecerá quando o João tentar gravar um arquivo novo de tamanho 30 M?"
  options:
    - "A gravação terá sucesso, mas o arquivo será truncado permanentemente."
    - "A gravação terá sucesso, mas o arquivo estará disponível apenas durante sete dias."
    - "A gravação falhará, e o arquivo será truncado permanentemente."
    - "A gravação terá sucesso, mas o arquivo será truncado em sete dias."
    - "A gravação falhará, mas o root pode recuperar o arquivo inteiro dentro de sete dias."
  answer: 3
  comment: "João tem 90 MB e tenta gravar 30 MB, totalizando 120 MB. Como o limite 'hard' é de 110 MB, o sistema interrompe a escrita assim que esse teto é atingido. O resultado é uma falha de gravação (Disk quota exceeded) e o arquivo fica truncado com apenas 20 MB (o espaço que restava até os 110 MB). #quotas #hardlimit #ext2"

- id: "104-018"
  topic: "104.1"
  question: "Você realizou modificações em sua tabela de partições usando o comando fdisk, porém antes de sair você percebeu que fez alterações no disco errado. O que pode ser feito para resolver o problema?"
  options:
    - "Digitar t para desfazer todas as mudanças"
    - "Digitar w para sair do fdisk sem salvar as mudanças no disco"
    - "Digitar q para sair do fdisk sem salvar as mudanças no disco"
    - "Digitar u várias vezes para desfazer as mudanças"
    - "Não há como recuperar as alterações já realizadas no disco"
  answer: 3
  comment: "As alterações realizadas dentro da interface do fdisk só serão efetivadas ao se sair da ferramenta, salvando as alterações com a opção “w”. Da mesma forma, é possível sair da interface sem que as alterações sejam efetivadas através da opção “q”. #fdisk #partitions"

- id: "104-019"
  topic: "104.1"
  question: "O que o comando abaixo faz?"
  code: "# mkfs -t ext3 /dev/sda2"
  options:
    - "Converte um sistema de arquivos ext3 para um sistema de arquivos ext2"
    - "Cria um novo sistema de arquivos ext3 no /dev/sda2, sobrescrevendo qualquer sistema de arquivos e dados existentes."
    - "Define o código do tipo da tabela de partições de /dev/sda2 para ext3"
    - "Converte uma partição FAT em ext3fs, sem corromper os arquivos existentes na partição"
    - "Nada, a opção -t não é válida"
  answer: 2
  comment: "A opção -t do mkfs é utilizada para definir o tipo de filesystem a ser utilizado, se não for informado o padrão é ext2. Além disso pode ser utilizado diretamente o mkfs.ext3, sem argumentos. A opção -j do mke2fs cria um sistema de arquivos com journal, que na prática é o ext3. #mkfs #ext3"

- id: "104-020"
  topic: "104.1"
  question: "Dentro da interface do comando parted, qual das instruções abaixo pode ser usada para diminuir o tamanho de uma partição?"
  options:
    - "resizepart"
    - rescue"
    - "reducepart"
    - "disk_resize"
    - "Não é possível reduzir o tamanho de uma partição"
  answer: 1
  comment: "No “parted”, o comando “resizepart” vai alterar o final da partição, dessa forma pode ser utilizado para aumentá-la ou diminuí-la."

- id: "104-021"
  topic: "104.2"
  question: "Entre as opções abaixo, indique o comando que deu origem à saída:"
  code: "/dev/sda1    7,3G     5,6G     1,7G     78% /home"
  options:
    - "du -h"
    - df -m"
    - "ls -lh"
    - "du -s"
    - "df -h"
  answer: 5
  comment: "O comando df é utilizado para verificar a utilização de uma partição, ao se utilizar a opção -h os números são exibidos em formato “human-readable”, ou “humanamente legível”, ou seja, a informação é exibida em MB, GB ao invés do padrão bytes. #df #diskusage"

- id: "104-022"
  topic: "104.3"
  question: "Qual dos comandos abaixo pode ser utilizado para se obter o UUID de uma partição para que o valor seja utilizado na configuração do arquivo /etc/fstab?"
  options:
    - "df -U"
    - "du -sh"
    - "blkid"
    - "mount -l"
  answer: 3
  comment: "Os comandos “blkid” e “lsblk -f” exibirão todas as partições e seus respectivos valores de UUID, Label e diversas outras informações."

- id: "104-023"
  topic: "104.3"
  question: "Qual da seguinte entrada no /etc/fstab irá montar o /dev/sdc2 no diretório /var no momento do boot?"
  options:
    - "/var         /dev/sdc2    defaults     ext4        0    0"
    - "/dev/sdc2    /var         ext4         defaults    0    0"
    - "/dev/sdc2    /var         auto         ext4        0    0"
    - "ext4         /dev/sdc2    ext4         auto"
    - "/dev/sdc2    /var         ext4         noauto      0    0 "
  answer: 2
  comment: "Cada linha do arquivo /etc/fstab deve conter 6 campos, são eles: <file system>    <mount point>    <type>    <options>    <dump>    <pass>"

- id: "104-024"
  topic: "104.5"
  question: "Qual das alternativas listadas abaixo é equivalente ao seguinte comando ?"
  code: "chmod 754 arquivo1"
  options:
    - "chown 754 arquivo1"
    - "chmod ugo=rwx arquivo1"
    - "chmod u=rwx,g=rx,o=r arquivo1"
    - "chmod u=7,g=5,o=4 arquivo1"
    - "chattr 754 arquivo1"
  answer: 3
  comment: |
    O chmod aceita as definições de permissões em dois modos, o modo octal utilizado na pergunta, e o modo com o uso de opções como a seguir:

    u : Define as permissões para o usuário dono do arquivo.
    g : Define as permissões para o grupo dono do arquivo.
    o : Define as permissões para os demais usuários que não são donos nem fazem parte do grupo dono do arquivo.
    a : Define as permissões para todos os usuários.
    +r / -r : Adiciona/Remove a permissão de leitura.
    +w / -w : Adiciona/Remove a permissão de escrita.
    +x / -x : Adiciona/Remove a permissão de execução.

- id: "104-025"
  topic: "104.5"
  question: "Em uma sessão em que o valor do umask é 0002, qual a permissão padrão da criação de um arquivo?"
  options:
    - "rw-rw-r–"
    - "rwxrwxrw-"
    - "rw-r–r–"
    - "rw-rw-rw-"
    - "r-xr-xr–"
  answer: 1
  comment: "As permissões são definidas subtraindo o valor do umask do valor 666 para aquivos e 777 para diretórios. Dessa forma, o valor 022, que também pode aparecer como 0022, será 777 – 022 = 755 (rwxr-xr-x). #umask #permissions"

- id: "104-026"
  topic: "104.5"
  question: "O administrador deseja definir que o arquivo SimuladoLPI tenha como dono o usuário Prova1 e o grupo LPI. Qual dos comandos, ou sequência deles, não causará o resultado esperado?"
  options:
    - "chown Prova1:LPI SimuladoLPI"
    - "chown Prova1 LPI SimuladoLPI"
    - "chown Prova1.LPI SimuladoLPI"
    - "chown Prova1 SimuladoLPI; chgrp LPI SimuladoLPI"
    - "chown Prova1 SimuladoLPI; chown :LPI SimuladoLPI"
  answer: 2
  comment: "O chown pode ser utilizado para definir o usuário e o grupo proprietário, aceitando as seguintes sintaxes: chown <usuario>:<grupo> <arquivo> ou chown <usuario>.<grupo> <arquivo> , sendo que o <grupo> pode ser omitido caso não se deseje alterá-lo. #chown"

- id: "104-027"
  topic: "104.6"
  question: "Com relação aos links físicos e simbólicos, qual das afirmações abaixo não é verdadeira?"
  options:
    - "Um hard link não pode ter como origem um arquivo de uma partição diferente"
    - "Um link físico e seu arquivo de origem compartilham o mesmo inode inicial"
    - "O tamanho de um arquivo de link simbólico é exatamente o tamanho do caminho para o arquivo que ele aponta"
    - "Um link simbólico pode apontar para um diretório"
    - "Ao apagar o arquivo origem de um link físico, não será mais possível acessar a informação através do arquivo de link."
  answer: 5
  comment: "Diferentemente de um link físico, não há nenhum problema do link simbólico apontar para um arquivo/diretório em uma partição diferente da qual está criado. Os links físicos possuem o mesmo inode que o arquivo destino. Um link físico é um outro arquivo que referencia o mesmo conjunto de dados, então após criados os arquivos são independes e podem ser renomeados e até apagados. Apenas o link simbólico utiliza o sinal -> para indicar seu destino. #links #symlink #hardlink"

- id: "104-028"
  topic: "104.7"
  question: "Segundo o padrão FHS, em qual diretório deve estar localizado o comando “fsck”?"
  options:
    - "/bin/fsck"
    - "/usr/lib/fsck"
    - "/opt/fsck"
    - "/sbin/fsck"
    - "/usr/local/sbin/fsck"
  answer: 4
  comment: "O fsck é um comando crítico, utilizado para recuperar partições corrompidas, e somente pode ser utilizado pelo usuário root (sysadmin), por isso está presente do diretório /sbin. Você também pode utilizar o diretório /usr/sbin, visto que o /sbin é sempre um link para o /usr/sbin. #fhs #fsck"

- id: "104-029"
  topic: "104.7"
  question: "Qual comando deve ser utilizado para atualizar a base de dados utilizada pelo comando locate?"
  options:
    - "updateconfig"
    - "updatedb"
    - "dbupdate"
    - "fsck"
    - "O locate não utiliza nenhuma base de dados"
  answer: 2
  comment: "O comando locate utiliza uma base interna do Linux que contém a localização de todos os arquivos do sistema, possibilitando uma resposta rápida ao comando, no entanto essa base precisa ser atualizada pelo comando updatedb, normalmente executado na inicialização do sistema, ou regularmente por agendamento. #locate #updatedb"

- id: "104-030"
  topic: "104.1"
  question: "Qual é a vantagem de um sistema de arquivos com Journalling sobre um filesystem sem Journalling?"
  options:
    - "FileSystems com Journalling gravam todas as transações, possibilitando que elas seja desfeitas"
    - "Partições com suporte a Journalling podem definir diferentes permissões em seus arquivos, aumentando a segurança"
    - "Partições que utilizam o Journalling nunca precisam executar o fsck"
    - "FileSystems com Journalling requerem checagens de disco (fsck) menores e mais rápidas após uma queda de energia"
    - "Sistemas com Journallling funcionam melhor com arquivos grandes"
  answer: 4
  comment: "O journal apenas as últimas operações de escrita e mudanças na partição, tornando a recuperação de uma falha no disco mais rápida e evitando corrompimentos durante quedas de energia ou desligamentos abruptos. O recurso do journaling foi implementado no filesystem ext3, sendo a única diferença com relação ao ext2. #journaling #ext3"

- id: "104-031"
  topic: "104.1"
  question: "Qual sistema de arquivos tem como principais características ser leve e suportar arquivo maiores que 4GB, sendo recomendado e muito utilizado em cartões SDXC?"
  options:
    - "FAT32"
    - "exFAT"
    - "NTFS"
    - "btrfs"
  answer: 2
  comment: "O exFAT permite arquivos individuais maiores que 4 GiB, facilitando a gravação contínua de vídeos em HD longos que pode exceder o limite de 4 GiB em menos de uma hora. O exFAT foi adotado pela SD Card Association como o sistema de arquivos padrão para cartões SDXC maiores que 32 GiB. #exfat #sdxc"

- id: "104-032"
  topic: "104.2"
  question: "Qual comando deve ser utilizado para se reparar falhas em uma partição que utiliza o sistema de arquivos XFS?"
  options:
    - "xfs_repair"
    - "xfs_admin"
    - "xfs_check"
    - "xfsrestore"
    - "xfs_fsr"
  answer: 1
  comment: "O xfs_repair repara sistemas de arquivos XFS corrompidos ou danificados O e2fsck é apenas para ext2, ext3 e ext4. xfs_fsr é o reorganizador do sistema de arquivos do XFS. A sintaxe do fsck está incorreta, mas mesmo usando o fsck.xfs ou o fsck -t xfs, o comando indicará o uso do xfs_repair. #xfs #xfs_repair"

- id: "104-033"
  topic: "104.3"
  question: "Na configuração de um ponto de montagem de partição via systemd, no arquivo de configuração, qual opção determina o diretório em que a partição deve ser montada?"
  options:
    - "Mount="
    - "Options="
    - "What="
    - "Where="
    - "FS="
  answer: 4
  comment: "Um ponto de montagem também pode ser configurado através de uma Unit no Systemd. Para isso basta criar um arquivo do tipo ponto-de-montagem.mount nos diretórios de configuração do systemd (/lib/systemd/system ou /etc/systemd/system/). Entre outras opções, o “What” define o dispositivo e o “Where” o ponto de montagem. #systemd #mount"

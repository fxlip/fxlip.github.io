- id: "104-001"
  topic: "104.1"  
  question: "Como você poderia verificar a integridade de um sistema de arquivos não montado /dev/hdb7, mesmo que ele tenha uma marcação de \"limpo\" (cleanflag) válida?"
  options:
    - "chkdsk /dev/hdb7"
    - "fsck /dev/hdb7"
    - "hdcheck --force /dev/hdb7"
    - "fsck -f /dev/hdb7"
    - "fschk -f /dev/hdb7"
  answer: 4
  comment: "O comando fsck por padrão ignora sistemas de arquivos marcados como \"limpos\" para economizar tempo. A flag -f (force) ignora o estado do cleanflag e realiza uma verificação completa e minuciosa de toda a estrutura de inodes e blocos. #fsck"

- id: "104-002"
  topic: "104.3"  
  question: "Você criou um novo diretório chamado /foo e copiou dois arquivos, bar e foobar, para dentro dele. Agora, você monta um disquete em /foo usando o comando mount /dev/fd0 /foo. O que acontece com os arquivos se você usar o comando rm -rf /foo/* e depois umount /foo?"
  options:
    - "Eles são removidos."
    - "Eles são removidos, mas você pode restaurá-los."
    - "Não é possível montar um disquete em um diretório que não esteja vazio."
    - "Nada. Eles ainda estão lá."
    - "Os nomes aparecem no diretório, mas os inodes são excluídos."
  answer: 4
  comment: "Quando você monta um sistema de arquivos em um diretório que já contém arquivos, o conteúdo original fica \"mascarado\" (escondido) pelo novo sistema de arquivos. O comando rm -rf /foo/* deletará apenas o que está no disquete. Ao desmontar, os arquivos originais reaparecem intactos. #mount"

- id: "104-003"
  topic: "104.4"  
  question: "Como você poderia obter a informação de qual tipo de cota está ativada para o usuário foo?"
  options:
    - "repquota foo"
    - "repquota --user foo"
    - "quota foo"
    - "quota --user foo"
    - "quotainfo foo"
  answer: 3
  comment: "O comando quota exibe os limites e o uso atual de disco para um usuário ou grupo. Ao passar o nome do usuário como argumento (quota foo), o sistema reporta as restrições impostas a essa conta específica em todos os sistemas de arquivos montados com suporte a cotas. #quota"

- id: "104-004"
  topic: "104.5"
  type: "discursive"
  question: "Qual o valor numérico do modo de permissão -rwxr-sr--?"
  answer: "2754"
  comment: "As permissões padrão são 754 (rwx=7, r-x=5, r--=4). O \"s\" no campo do grupo indica o bit especial SetGID ativado sobre uma permissão de execução (s minúsculo = x presente). O SetGID tem valor 2 no primeiro dígito da representação de quatro oitais. #chmod"

- id: "104-005"
  topic: "104.5"  
  question: "Como você poderia ajudar os usuários a criarem arquivos com permissões de arquivo rigorosas?"
  options:
    - "Ensinar os usuários a usar o chmod."
    - "Usar uma configuração de umask rigorosa no perfil do usuário."
    - "Alterar as permissões de diretório do usuário."
    - "Usar o cron para alterar as permissões dos arquivos dos usuários uma vez por dia."
    - "Usar substitutos para as ferramentas padrão do Unix que criam arquivos seguros."
  answer: 2
  comment: "O umask (User Mask) define as permissões padrão que serão subtraídas (mascaradas) no momento da criação de qualquer novo arquivo ou diretório. Configurar um umask como 0077 no .bash_profile ou /etc/profile, por exemplo, garante que apenas o dono tenha acesso aos arquivos criados, sem depender de ação manual posterior. #umask"

- id: "104-006"
  topic: "104.5"  
  question: "Como você poderia alterar o proprietário do arquivo foobar para o usuário foo?"
  options:
    - "chown foo:foobar"
    - "chown foobar foo"
    - "chown foo foobar"
    - "chmod --user foo foobar"
    - "chperm --user foo --file foobar"
  answer: 3
  comment: "O comando chown (change owner) segue a sintaxe básica chown [NOVO_DONO] [ARQUIVO]. Ele permite alterar o proprietário e, opcionalmente, o grupo de um arquivo ou diretório. Somente o superusuário (root) pode alterar o dono de um arquivo para outro usuário. #chown"

- id: "104-007"
  topic: "104.6"  
  question: "No diretório /home/foo existe um arquivo chamado bar que é um link simbólico para o arquivo foobar no mesmo diretório, criado com o comando ln -s foobar bar. Se você copiar o link para /tmp usando o comando cp -d /home/foo/bar /tmp, o que aconteceria?"
  options:
    - "A destino /tmp/bar é um link simbólico para /tmp/foobar"
    - "A destino /tmp/bar é um link simbólico para /home/foo/foobar"
    - "A destino /tmp/bar é um arquivo regular com o mesmo conteúdo que /home/foo/foobar"
    - "A destino /tmp/bar é um hardlink usando o mesmo inode que /home/foo/foobar"
    - "A destino /tmp/bar é um hardlink usando o mesmo inode que /home/foo/bar"
  answer: 1
  comment: "O comando ln -s foobar bar cria um link simbólico relativo. O arquivo bar contém apenas a string \"foobar\". A opção -d (ou --no-dereference) do comando cp garante que o link seja copiado como um link, preservando seu conteúdo literal. Como o conteúdo é \"foobar\", ao ser movido para /tmp, o sistema tentará resolver esse nome dentro do novo diretório."

- id: "104-008"
  topic: "104.7"
  type: "discursive"
  question: "Qual diretório contém a maioria dos arquivos de configuração do sistema? Insira o caminho completo."
  answer: "/etc"
  comment: "De acordo com o FHS (Filesystem Hierarchy Standard), o diretório /etc é o local centralizado para todos os arquivos de configuração estáticos do sistema. Ele não deve conter binários executáveis. #fhs"

- id: "104-009"
  topic: "104.2"
  question: "Que afirmativa sobre o comando \"du\" é verdadeira?"
  options:
    - "Dump User - backup dos arquivos dos usuários."
    - "DOS to Unix - Muda os arquivos do formato MS-DOS para UNIX"
    - "Dos Utility - Ferramenta para acesso de discos MS-DOS."
    - "Disk Usage - Mostra a quantidade de disco utilizada"
    - "Dir User - Mostra os diretórios dos usuários."
  answer: 4
  comment: "O comando du (Disk Usage) estima e exibe o espaço em disco usado por arquivos e diretórios específicos. Diferente do df, que lê os blocos livres do sistema de arquivos, o du percorre a árvore de diretórios somando o tamanho de cada arquivo recursivamente. #du"

- id: "104-010"
  topic: "104.7"
  question: "Em um sistema com partições separadas /, /usr, /var, /tmp, quais delas podem seguramente ser montadas como somente leitura?"
  options:
    - "/usr"
    - "/usr, /, /tmp"
    - "/var"
    - "/tmp"
    - "/var, /usr"
  answer: 1
  comment: "De acordo com o FHS (Filesystem Hierarchy Standard), o diretório /usr contém dados estáticos do sistema compartilháveis e imutáveis durante a operação normal (como binários e bibliotecas). Portanto, pode ser montado como read-only (ro) na rede ou localmente por segurança. Já partições como /var (logs, spools) e /tmp (arquivos temporários) exigem gravação constante (rw). #fhs #mount"

- id: "104-011"
  topic: "104.2"
  question: "Considere a linha seguinte. Deseja-se saber qual o comando que a produziu:"
  code: "/dev/hda8    1.9G     559M     1,7G     30% /home"
  options:
    - "df -m"
    - "du -k"
    - "df -h"
    - "df -k"
    - "du -s"
  answer: 3
  comment: "A saída apresenta sufixos de unidade como 'G' (Gigabytes) e 'M' (Megabytes), o que caracteriza o uso da flag -h (human-readable). O comando df (disk free) é o responsável por exibir o uso de espaço por sistema de arquivos montado, incluindo o ponto de montagem (/home). #df"

- id: "104-012"
  topic: "104.2"
  question: "Qual dos comandos seguintes pode ser usado para conferir um sistema de arquivos ext2? Selecione todas as alternativas que sejam aplicáveis."
  options:
    - "fsck /dev/hda5"
    - "fsck.ext2 /dev/hda5"
    - "fsck -ext2 /dev/hda5"
    - "e2fsck /dev/hda5"
    - "fsck.linux /dev/hda5"
  answer: [1, 2, 4]
  comment: "O utilitário fsck funciona como um wrapper que identifica o tipo de sistema de arquivos e chama o binário específico (fsck.ext2). O comando e2fsck é o utilitário nativo específico para a família ext (ext2/3/4). #fsck #ext2 #e2fsck"

- id: "104-013"
  topic: "104.1"
  question: "Você quer alterar as cotas de um usuário. Como fazer isso?"
  options:
    - "Usar o comando addquota usuário"
    - "Usar o comando edquota usuário"
    - "Usar o comando repquota"
    - "Editar a linha /home em /etc/fstab"
    - "Editar o arquivo /home/quota.user"
  answer: 2
  comment: "O comando edquota (Edit Quota) abre o editor de texto padrão (geralmente vi ou nano) com os limites de blocos e inodes do usuário específico, permitindo a alteração manual das cotas soft e hard. #quota #edquota"

- id: "104-014"
  topic: "104.1"
  question: "Qual das opções seguintes corresponde aos resultados comando:"
  code: "chmod g+s /home/software"
  options:
    - "O bit SGID será habilitado para /home/software para manter as permissões do grupo do diretório consistente para todos os arquivos criados."
    - "O sticky bit será habilitado para /home/software."
    - "O bit SGID será habilitado para /home/software, prevenindo acesso por não membros do grupo de software."
    - "O sticky bit será aplicado a todos os arquivos dentro de /home/software."
    - "O bit SUID será habilitado para /home/software."
  answer: 1
  comment: "Quando o bit SGID (Set Group ID) é aplicado a um diretório (g+s), todos os novos arquivos e subdiretórios criados dentro dele herdarão automaticamente o grupo proprietário do diretório pai, em vez do grupo primário do usuário que o criou. Isso é fundamental para diretórios de colaboração. #chmod #sgid"

- id: "104-015"
  topic: "104.1"
  question: "Qual o comando utilizado para criar uma partição de swap?"
  options:
    - "activeswap"
    - "swapon"
    - "mkswap"
    - "mkfs -t swap"
    - "initswap"
  answer: 3
  comment: "O comando 'mkswap' (make swap) é o responsável por preparar uma partição ou arquivo para ser utilizado como área de troca (swap), gravando a assinatura necessária. O comando 'swapon' apenas ativa uma área que já foi preparada pelo mkswap. #swap #mkswap"

- id: "104-016"
  topic: "104.1"
  question: "O comando umask 027 configura qual permissão padrão para criação de novos arquivos?"
  options:
    - "1640"
    - "1027"
    - "640"
    - "750"
    - "27"
  answer: 3
  comment: "A máscara umask subtrai permissões da permissão base (666 para arquivos, 777 para diretórios). Para um arquivo: 666 - 027 resulta em 640 (rw-r-----). O dono tem leitura/escrita, o grupo apenas leitura e outros não têm acesso. #umask #chmod"

- id: "104-017"
  topic: "104.1"
  question: "Um sistema de arquivos ext2 é configurado com cotas de usuário habilitadas. O limite soft é fixo em 100 MB por usuário, o limite hard é fixo em 110 MB por usuário, e o período de graça é de sete dias. O usuário João já possui 90 MB dos dados armazenados no sistema. O que acontecerá quando o João tentar gravar um arquivo novo de tamanho 30 M?"
  options:
    - "A gravação terá sucesso, mas o arquivo será truncado permanentemente."
    - "A gravação terá sucesso, mas o arquivo estará disponível apenas durante sete dias."
    - "A gravação falhará, e o arquivo será truncado permanentemente."
    - "A gravação terá sucesso, mas o arquivo será truncado em sete dias."
    - "A gravação falhará, mas o root pode recuperar o arquivo inteiro dentro de sete dias."
  answer: 3
  comment: "João tem 90 MB e tenta gravar 30 MB, totalizando 120 MB. Como o limite 'hard' é de 110 MB, o sistema interrompe a escrita assim que esse teto é atingido. O resultado é uma falha de gravação (Disk quota exceeded) e o arquivo fica truncado com apenas 20 MB (o espaço que restava até os 110 MB). #quotas #hardlimit #ext2"

- id: "104-018"
  topic: "104.1"
  question: "Você realizou modificações em sua tabela de partições usando o comando fdisk, porém antes de sair você percebeu que fez alterações no disco errado. O que pode ser feito para resolver o problema?"
  options:
    - "Digitar t para desfazer todas as mudanças"
    - "Digitar w para sair do fdisk sem salvar as mudanças no disco"
    - "Digitar q para sair do fdisk sem salvar as mudanças no disco"
    - "Digitar u várias vezes para desfazer as mudanças"
    - "Não há como recuperar as alterações já realizadas no disco"
  answer: 3
  comment: "As alterações realizadas dentro da interface do fdisk só serão efetivadas ao se sair da ferramenta, salvando as alterações com a opção“w”. Da mesma forma, é possível sair da interface sem que as alterações sejam efetivadas através da opção“q”. #fdisk"

- id: "104-019"
  topic: "104.1"
  question: "O que o comando abaixo faz?"
  code: "# mkfs -t ext3 /dev/sda2"
  options:
    - "Converte um sistema de arquivos ext3 para um sistema de arquivos ext2"
    - "Cria um novo sistema de arquivos ext3 no /dev/sda2, sobrescrevendo qualquer sistema de arquivos e dados existentes."
    - "Define o código do tipo da tabela de partições de /dev/sda2 para ext3"
    - "Converte uma partição FAT em ext3fs, sem corromper os arquivos existentes na partição"
    - "Nada, a opção -t não é válida"
  answer: 2
  comment: "A opção -t do mkfs é utilizada para definir o tipo de filesystem a ser utilizado, se não for informado o padrão é ext2. Além disso pode ser utilizado diretamente o mkfs.ext3, sem argumentos. A opção -j do mke2fs cria um sistema de arquivos com journal, que na prática é o ext3. #mkfs #ext3"

- id: "104-020"
  topic: "104.1"
  question: "Dentro da interface do comando parted, qual das instruções abaixo pode ser usada para diminuir o tamanho de uma partição?"
  options:
    - "resizepart"
    - "rescue"
    - "reducepart"
    - "disk_resize"
    - "Não é possível reduzir o tamanho de uma partição"
  answer: 1
  comment: "No“parted”, o comando“resizepart” vai alterar o final da partição, dessa forma pode ser utilizado para aumentá-la ou diminuí-la."

- id: "104-021"
  topic: "104.2"
  question: "Entre as opções abaixo, indique o comando que deu origem à saída:"
  code: "/dev/sda1    7,3G     5,6G     1,7G     78% /home"
  options:
    - "du -h"
    - "df -m"
    - "ls -lh"
    - "du -s"
    - "df -h"
  answer: 5
  comment: "O comando df é utilizado para verificar a utilização de uma partição, ao se utilizar a opção -h os números são exibidos em formato“human-readable”, ou“humanamente legível”, ou seja, a informação é exibida em MB, GB ao invés do padrão bytes. #df #du"

- id: "104-022"
  topic: "104.3"
  question: "Qual dos comandos abaixo pode ser utilizado para se obter o UUID de uma partição para que o valor seja utilizado na configuração do arquivo /etc/fstab?"
  options:
    - "df -U"
    - "du -sh"
    - "blkid"
    - "mount -l"
  answer: 3
  comment: "Os comandos“blkid” e“lsblk -f” exibirão todas as partições e seus respectivos valores de UUID, Label e diversas outras informações."

- id: "104-023"
  topic: "104.3"
  question: "Qual da seguinte entrada no /etc/fstab irá montar o /dev/sdc2 no diretório /var no momento do boot?"
  options:
    - "/var         /dev/sdc2    defaults     ext4        0    0"
    - "/dev/sdc2    /var         ext4         defaults    0    0"
    - "/dev/sdc2    /var         auto         ext4        0    0"
    - "ext4         /dev/sdc2    ext4         auto"
    - "/dev/sdc2    /var         ext4         noauto      0    0 "
  answer: 2
  comment: "Cada linha do arquivo /etc/fstab deve conter 6 campos, são eles: <file system> <mount point> <type> <options> <dump> <pass>"

- id: "104-024"
  topic: "104.5"
  question: "Qual das alternativas listadas abaixo é equivalente ao seguinte comando ?"
  code: "chmod 754 arquivo1"
  options:
    - "chown 754 arquivo1"
    - "chmod ugo=rwx arquivo1"
    - "chmod u=rwx,g=rx,o=r arquivo1"
    - "chmod u=7,g=5,o=4 arquivo1"
    - "chattr 754 arquivo1"
  answer: 3
  comment: |
    O chmod aceita as definições de permissões em dois modos, o modo octal utilizado na pergunta, e o modo com o uso de opções como a seguir:

    u : Define as permissões para o usuário dono do arquivo.
    g : Define as permissões para o grupo dono do arquivo.
    o : Define as permissões para os demais usuários que não são donos nem fazem parte do grupo dono do arquivo.
    a : Define as permissões para todos os usuários.
    +r / -r : Adiciona/Remove a permissão de leitura.
    +w / -w : Adiciona/Remove a permissão de escrita.
    +x / -x : Adiciona/Remove a permissão de execução.

- id: "104-025"
  topic: "104.5"
  question: "Em uma sessão em que o valor do umask é 0002, qual a permissão padrão da criação de um arquivo?"
  options:
    - "rw-rw-r--"
    - "rwxrwxrw-"
    - "rw-r--r--"
    - "rw-rw-rw-"
    - "r-xr-xr--"
  answer: 1
  comment: "As permissões são definidas subtraindo o valor do umask do valor 666 para aquivos e 777 para diretórios. Dessa forma, o valor 0002, que também pode aparecer como 002, será 666 – 002 = 664 (rw-rw-r--). #umask #chmod"

- id: "104-026"
  topic: "104.5"
  question: "O administrador deseja definir que o arquivo SimuladoLPI tenha como dono o usuário Prova1 e o grupo LPI. Qual dos comandos, ou sequência deles, não causará o resultado esperado?"
  options:
    - "chown Prova1:LPI SimuladoLPI"
    - "chown Prova1 LPI SimuladoLPI"
    - "chown Prova1.LPI SimuladoLPI"
    - "chown Prova1 SimuladoLPI; chgrp LPI SimuladoLPI"
    - "chown Prova1 SimuladoLPI; chown :LPI SimuladoLPI"
  answer: 2
  comment: "O chown pode ser utilizado para definir o usuário e o grupo proprietário, aceitando as seguintes sintaxes: chown <usuario>:<grupo> <arquivo> ou chown <usuario>.<grupo> <arquivo> , sendo que o <grupo> pode ser omitido caso não se deseje alterá-lo. #chown"

- id: "104-027"
  topic: "104.6"
  question: "Com relação aos links físicos e simbólicos, qual das afirmações abaixo não é verdadeira?"
  options:
    - "Um hard link não pode ter como origem um arquivo de uma partição diferente"
    - "Um link físico e seu arquivo de origem compartilham o mesmo inode inicial"
    - "O tamanho de um arquivo de link simbólico é exatamente o tamanho do caminho para o arquivo que ele aponta"
    - "Um link simbólico pode apontar para um diretório"
    - "Ao apagar o arquivo origem de um link físico, não será mais possível acessar a informação através do arquivo de link."
  answer: 5
  comment: "Diferentemente de um link físico, não há nenhum problema do link simbólico apontar para um arquivo/diretório em uma partição diferente da qual está criado. Os links físicos possuem o mesmo inode que o arquivo destino. Um link físico é um outro arquivo que referencia o mesmo conjunto de dados, então após criados os arquivos são independes e podem ser renomeados e até apagados. Apenas o link simbólico utiliza o sinal -> para indicar seu destino."

- id: "104-028"
  topic: "104.7"
  question: "Segundo o padrão FHS, em qual diretório deve estar localizado o comando “fsck”?"
  options:
    - "/bin/fsck"
    - "/usr/lib/fsck"
    - "/opt/fsck"
    - "/sbin/fsck"
    - "/usr/local/sbin/fsck"
  answer: 4
  comment: "O fsck é um comando crítico, utilizado para recuperar partições corrompidas, e somente pode ser utilizado pelo usuário root (sysadmin), por isso está presente do diretório /sbin. Você também pode utilizar o diretório /usr/sbin, visto que o /sbin é sempre um link para o /usr/sbin. #fhs #fsck"

- id: "104-029"
  topic: "104.7"
  question: "Qual comando deve ser utilizado para atualizar a base de dados utilizada pelo comando locate?"
  options:
    - "updateconfig"
    - "updatedb"
    - "dbupdate"
    - "fsck"
    - "O locate não utiliza nenhuma base de dados"
  answer: 2
  comment: "O comando locate utiliza uma base interna do Linux que contém a localização de todos os arquivos do sistema, possibilitando uma resposta rápida ao comando, no entanto essa base precisa ser atualizada pelo comando updatedb, normalmente executado na inicialização do sistema, ou regularmente por agendamento. #locate #updatedb"

- id: "104-030"
  topic: "104.1"
  question: "Qual é a vantagem de um sistema de arquivos com Journalling sobre um filesystem sem Journalling?"
  options:
    - "FileSystems com Journalling gravam todas as transações, possibilitando que elas seja desfeitas"
    - "Partições com suporte a Journalling podem definir diferentes permissões em seus arquivos, aumentando a segurança"
    - "Partições que utilizam o Journalling nunca precisam executar o fsck"
    - "FileSystems com Journalling requerem checagens de disco (fsck) menores e mais rápidas após uma queda de energia"
    - "Sistemas com Journallling funcionam melhor com arquivos grandes"
  answer: 4
  comment: "O journal registra apenas as últimas operações de escrita e mudanças na partição, tornando a recuperação de uma falha no disco mais rápida e evitando corrompimentos durante quedas de energia ou desligamentos abruptos. O recurso do journaling foi implementado no filesystem ext3, sendo a única diferença com relação ao ext2. #ext3"

- id: "104-031"
  topic: "104.1"
  question: "Qual sistema de arquivos tem como principais características ser leve e suportar arquivo maiores que 4GB, sendo recomendado e muito utilizado em cartões SDXC?"
  options:
    - "FAT32"
    - "exFAT"
    - "NTFS"
    - "btrfs"
  answer: 2
  comment: "O exFAT permite arquivos individuais maiores que 4 GiB, facilitando a gravação contínua de vídeos em HD longos que pode exceder o limite de 4 GiB em menos de uma hora. O exFAT foi adotado pela SD Card Association como o sistema de arquivos padrão para cartões SDXC maiores que 32 GiB."

- id: "104-032"
  topic: "104.2"
  question: "Qual comando deve ser utilizado para se reparar falhas em uma partição que utiliza o sistema de arquivos XFS?"
  options:
    - "xfs_repair"
    - "xfs_admin"
    - "xfs_check"
    - "xfsrestore"
    - "xfs_fsr"
  answer: 1
  comment: "O xfs_repair repara sistemas de arquivos XFS corrompidos ou danificados O e2fsck é apenas para ext2, ext3 e ext4. xfs_fsr é o reorganizador do sistema de arquivos do XFS. A sintaxe do fsck está incorreta, mas mesmo usando o fsck.xfs ou o fsck -t xfs, o comando indicará o uso do xfs_repair. #xfs #xfs_repair"

- id: "104-033"
  topic: "104.3"
  question: "Na configuração de um ponto de montagem de partição via systemd, no arquivo de configuração, qual opção determina o diretório em que a partição deve ser montada?"
  options:
    - "Mount="
    - "Options="
    - "What="
    - "Where="
    - "FS="
  answer: 4
  comment: "Um ponto de montagem também pode ser configurado através de uma Unit no Systemd. Para isso basta criar um arquivo do tipo ponto-de-montagem.mount nos diretórios de configuração do systemd (/lib/systemd/system ou /etc/systemd/system/). Entre outras opções, o“What” define o dispositivo e o“Where” o ponto de montagem. #systemd #mount"

- id: "104-034"
  topic: "104.7"
  question: "Conforme o FHS, dentre as opções a seguir, qual a melhor definição para os arquivos contidos no diretório /var ?"
  options:
    - "Contém arquivos com informações do sistema e do hardware"
    - "Arquivos temporários utilizados por usuários e aplicações"
    - "Contém arquivos e bibliotecas compartilhadas por diversas aplicações"
    - "Arquivos com dados variados e voláteis, como logs, caches, locks e etc"
  answer: 4
  comment: "O diretório /var (Variable) é destinado a arquivos que mudam de tamanho ou conteúdo durante a operação normal do sistema, como logs, arquivos de spool e bases de dados temporárias. #fhs"

- id: "104-035"
  topic: "104.2"
  question: "Qual opção do comando tune2fs é utilizada para alterar a porcentagem de espaço reservada para o usuário root em uma partição com o sistema de arquivos ext4?"
  options:
    - "-i"
    - "-s"
    - "-o"
    - "-m"
    - "-c"
  answer: 4
  comment: "A opção -m do tune2fs altera o valor do parâmetro“reserved-blocks-percentage”, que define a porcentagem do sistema reservada ao root (padrão 5%). #ext4 #tune2fs"

- id: "104-036"
  topic: "103.5"
  question: "Qual comando exibe a lista de todas as tarefas executadas em background no shell atual?"
  options:
    - "top"
    - "pgrep"
    - "ps -a"
    - "jobs"
  answer: 4
  comment: "O comando jobs mostra todos os processos (ou conjunto deles) iniciados em background, com o uso do &, na sessão atual. #jobs #bg #proc #shell"

- id: "104-037"
  topic: "104.3"
  question: "Qual das entradas do arquivo /etc/fstab abaixo está incorreta?"
  options:
    - "LABEL=Partition1     /var     ext4     defaults     0     1"
    - "/dev/sr0     /media/cdrom     iso9660     user,noauto     0     0"
    - "UUID=E24E-BD2F     none     swap     sw     0     0"
    - "/home     /dev/sda2     defaults,usrquota,grpquota     1     2"
  answer: 4
  comment: "A primeira informação das linhas do /etc/fstab deve ser o nome do dispositivo (device, UUID ou LABEL), o segundo deve ser o diretório a ser montado. No caso de uma partição de swap, o segundo campo pode ser descrito como“none”. #fstab #mount"

- id: "104-038"
  topic: "103.4"
  question: "Qual dos seguintes redirecionamentos irá escrever a saída padrão e a saída de erro no arquivo filename?"
  options:
    - "2>&1 >filename"
    - ">filename 2>&1"
    - "1>&2> filename"
    - ">>filename"
  answer: 2
  comment: "A indicação >filename redireciona a saída padrão (stdout, descritor de valor 1) para o arquivo filename. A indicação 2>&1 diz que a saída de erro (stderr, descritor de valor 2) deve ser associada ao mesmo local que está associada a saída padrão. #stdout #stderr #bash #file"

- id: "104-039"
  topic: "103.4"
  question: "Qual comando deve ser usado para que o resultado do comando “ls -l” seja gravado ao final do arquivo log.out, sem apagar o conteúdo anterior desse arquivo?"
  options:
    - "ls -l | tee log.out"
    - "ls -l > log.out"
    - "ls -l 2> log.out"
    - "ls -l >> log.out"
  answer: 4
  comment: "Ao contrário do >, o redirecionador >> faz um append no final do arquivo informado, mantendo o que estava escrito anteriormente. O tee por padrão sobrescreve o arquivo informado. #ls #bash #stdout"

- id: "104-040"
  topic: "104.3"
  question: "O administrador do sistema deseja configurar a montagem automática de uma partição com o seu UUID. Quais comandos podem ser utilizados para se obter o valor do UUID de todas as partições do sistema? (Selecione DUAS Respostas Corretas)"
  options:
    - "blkid"
    - "mount"
    - "df -U"
    - "systemctl list-mounts"
    - "lsblk -f"
  answer: [1, 5]
  comment: "Os comandos“blkid” e“lsblk -f” exibirão todas as partições e seus respectivos valores de UUID, Label e diversas outras informações. #uuid #blkid #lsblk #fstab"

- id: "104-041"
  topic: "103.7"
  question: "Das expressões regulares abaixo, qual pode ser utilizada para encontrar registros que comecem com a indicação de horário (Hora:Minuto), no formato 24-horas, também conhecido como formato militar, ou seja, 02:30, 14:22, 21:49, 9:49, aceitando inclusive que o valor da hora comece ou não com 0, por exemplo 1:30 e 01:30?"
  options:
    - "[0-2]?[0-9]:[0-5][0-9]$"
    - "^([01][0-9]|2[0123]):[0-5][0-9]"
    - "^(0?[0-9]|1[0-9]|2[0-3]):[0-5][0-9]"
    - "^[0-9]?[0-9]:[0-5][0-9]"
  answer: 3
  comment: "Os colchetes [] definem uma lista de valores possíveis. Os parenteses () definem grupos que podem ser separados por |, no sentido de ou. O caractere ? indica que o caractere ou grupo anterior é opcional. E o ^ indica que a expressão deve estar no começo de uma linha. #regex #grep #egrep"

- id: "104-042"
  topic: "103.7"
  question: "Qual comando mostra todas os registros do arquivo /etc/passwd, exceto os que tiverem a string “/bin/false”"
  options:
    - "grep -v “/bin/false” /etc/passwd"
    - "egrep -c /bin/false /etc/passwd"
    - "fgrep “/bin/false” /etc/passwd"
    - "fgrep -c “/bin/false” /etc/passwd"
  answer: 1
  comment: "No grep/egrep/fgrep, a opção -v tem o efeito de não exibir a string ou os resultados da expressão utilizada. #grep #egrep #fgrep #bash"

- id: "104-043"
  topic: "103.6"
  question: "Qual o valor de NICE usado para que um processo tenha a máxima prioridade possível?"
  options:
    - "19"
    - "20"
    - "-19"
    - "-20"
  answer: 4
  comment: "O nice de um processo pode ser configurado com valores que vão do -20 ao 19, aonde o -20 aumenta ao máximo a prioridade, e o 19 a diminui ao máximo. #nice"

- id: "104-044"
  topic: "104.5"
  question: "Qual comando impedirá que qualquer usuário que não seja o dono ou membros do grupo associado ao diretório /usr/dir, possam ler (com o comando ls) ou acessar (com o comando cd) este diretório?"
  options:
    - "chmod 774 /usr/dir"
    - "chmod o-rx /usr/dir"
    - "chmod o-r /usr/dir"
    - "chmd 775 /usr/dir"
  answer: 2
  comment: "Em um diretório, a permissão 'r' permite listar os arquivos e subdiretórios, enquanto a permissão 'x' permite acessar (entrar) no diretório. Ao utilizar o-rx no chmod, removem-se as permissões de leitura e execução para a categoria 'outros' (others). #chmod"

- id: "104-045"
  topic: "104.5"
  question: "Quais dos seguintes comandos podem ser utilizados para se definir o Sticky bit no diretório /tmp? (Selecione DUAS Respostas Corretas)"
  options:
    - "chmod g+s /tmp"
    - "chmod 1775 /tmp"
    - "chmod 2775 /tmp"
    - "chmod 4775 /tmp"
    - "chmod o+t /tmp"
  answer: [2, 5]
  comment: "O Sticky bit determina que um arquivo só pode ser apagado ou renomeado pelo seu proprietário, pelo proprietário do diretório ou pelo root. Em representação numérica, o valor 1 precede as permissões padrão (ex: 1775); em modo simbólico, utiliza-se o+t. #chmod"

- id: "104-046"
  topic: "104.6"
  question: "Qual comando criará um link simbólico chamado acesso-direto apontando para o arquivo /opt/sistema/arquivo?"
  options:
    - "ln -s /opt/sistema/arquivo acesso-direto"
    - "ln -s acesso-direto /opt/sistema/arquivo"
    - "ln acesso-direto /opt/sistema/arquivo"
    - "ln /opt/sistema/arquivo acesso-direto"
  answer: 1
  comment: "A opção -s do comando ln especifica a criação de um link simbólico e a principal forma de uso é: ln -s <arquivo alvo> <nome do link> #ln"

- id: "104-047"
  topic: "104.7"
  question: "Qual opção do comando find é utilizada para limitar o número de subdiretórios em que a pesquisa recursiva ocorrerá?"
  options:
    - "-path"
    - "-print"
    - "-p"
    - "-levels"
    - "-maxdepth"
  answer: 5
  comment: "No find, com a opção -maxdepth é possível definir em quantos níveis de diretórios a pesquisa pelos arquivos se aprofundará. #find"

- id: "104-048"
  topic: "104.1"
  type: "discursive"
  question: "Após criar uma nova partição do tipo swap, qual o próximo comando que deve ser utilizado pelo administrador do sistema antes de torná-la ativa? (Informe apenas o comando, sem o caminho ou argumentos)"
  answer: "mkswap"
  comment: "Após definir a partição, ainda é preciso formatá-la com o comando mkswap para que após isso ela possa ser incluída na área de swap com o comando swapon. #swap"

- id: "104-049"
  topic: "104.2"
  question: "Qual comando pode ser utilizado para verificar o uso de inodes da partição /dev/sdb1, montada no diretório /usr?"
  options:
    - "df /usr"
    - "df -i /dev/sdb1"
    - "du -i /usr"
    - "fsck /dev/sdb1"
  answer: 2
  comment: "O comando df é utilizado para verificar a utilização de uma partição, normalmente exibe o espaço em disco, mas com a opção -i exibe o uso de inodes. #df"

- id: "104-050"
  topic: "104.1"
  question: "Qual a principal diferença entre o sistema de arquivos ext2 e o ext3?"
  options:
    - "O ext2 usa particionamento MBR, enquanto que o ext3 usa GPT"
    - "O ext3 foi criado para suportar um maior volume de dados"
    - "Diferente do ext2, o ext3 suporta o recurso de journaling"
    - "Diferente do ext2, o ext3 suporta a alocação dinâmica de inodes"
  answer: 3
  comment: "O recurso do journaling foi implementado no filesystem ext3, sendo a única diferença com relação ao ext2. #ext3"

- id: "104-051"
  topic: "104.3"
  question: "Qual opção do comando mount é usada para que que o conteúdo de um diretório fique também disponível em outro diretório?"
  options:
    - "–copy"
    - "–link"
    - "–bind"
    - "–recursive"
  answer: 3
  comment: "A opção mount é usada para remontar um diretório também em algum outro diretório. Após essa configuração, o mesmo conteúdo pode ser acessado a partir de locais/diretórios diferentes. A sintaxe é: mount –bind oldir newdir #mount"

- id: "104-052"
  topic: "104.5"
  question: "Qual das seguintes configurações do umask fará com que todo novo arquivo criado tenha  a permissão 664 (rw-rw-r–) ?"
  options:
    - "0022"
    - "1122"
    - "0002"
    - "0113"
  answer: 3
  comment: "As permissões são definidas subtraindo o valor do umask do valor 666 para arquivos e 777 para diretórios. Dessa forma, o valor 0002, que também pode aparecer como 002, será 666 – 002 = 664 (rw-rw-r–). #umask"

- id: "104-053"
  topic: "104.6"
  question: "Quais afirmações são verdadeiras com relação aos links físicos e simbólicos? (Selecione TRÊS Respostas Corretas)"
  options:
    - "Um link simbólico pode ter como destino um arquivo em uma partição diferente"
    - "Um link simbólico tem o mesmo inode que seu arquivo/diretório destino"
    - "Apenas o link simbólico pode ter um diretório como destino, o link físico só pode ser utilizado para arquivos"
    - "O acesso aos dados através de um link físico será possível mesmo que o nome do arquivo seja alterado posteriormente"
    - "Em um link físico, será sempre utilizado o símbolo ->, para indicar o arquivo destino do link"
  answer: [1, 3, 4]
  comment: "Diferentemente de um link físico, não há nenhum problema do link simbólico apontar para um arquivo/diretório em uma partição diferente da qual está criado. Os links físicos possuem o mesmo inode que o arquivo destino. Um link físico é um outro arquivo que referencia o mesmo conjunto de dados, então após criados os arquivos são independentes e podem ser renomeados. Apenas o link simbólico utiliza o sinal -> para indicar seu destino. #inode"

- id: "104-054"
  topic: "104.3"
  question: "No arquivo /etc/fstab, como a partição a ser montada pode ser referenciada?"
  options:
    - "Apenas pelo nome do device na partição /dev, por exemplo /dev/sda1"
    - "Apenas pelo valor UUID"
    - "Pelo UUID ou pelo nome do device (/dev/sda1)"
    - "Pelo UUID, nome do device (/dev/sda1) ou Label do device"
  answer: 4
  comment: "No /etc/fstab, a partição pode ser identificada de três formas: pelo nome do device (/dev/sda1), pelo UUID (Universally Unique Identifier — identificador único por partição) ou pelo Label definido pelo usuário na criação da partição. O uso de UUID é preferível pois não muda quando dispositivos são adicionados ou removidos. #fstab #uuid"

- id: "104-055"
  topic: "104.2"
  question: "O administrador identificou que a partição do diretório /var está com 100% de utilização. Qual comando ele pode utilizar para identificar qual é, dentro do /var, o diretório com maior volume de dados?"
  options:
    - "df -h /var"
    - "find /var -name *"
    - "du -sh /var/*"
    - "tune2fs /var"
  answer: 3
  comment: "O comando du (disk usage) exibe o uso de espaço em disco de arquivos e diretórios recursivamente. A opção -s resume o total por item e -h exibe em formato legível. 'du -sh /var/*' mostra o tamanho de cada subdiretório de /var, facilitando identificar o maior. O df mostra o uso das partições, não dos diretórios internos. #du #df"

- id: "104-056"
  topic: "104.2"
  question: "Dentre os comandos abaixo, qual irá verificar e, se possível, realizar o reparo da partição /dev/sda2 formatada com o sistema de arquivos XFS?"
  options:
    - "e2fsck /dev/sda2"
    - "xfs_fsr /dev/sda2"
    - "xfs_repair /dev/sda2"
    - "fsck -p /dev/sda2"
  answer: 3
  comment: "O xfs_repair verifica e repara sistemas de arquivos XFS corrompidos. O e2fsck é exclusivo para ext2/ext3/ext4. O xfs_fsr é o desfragmentador do XFS, não o reparador. O fsck.xfs (ou fsck -t xfs) apenas indica o uso do xfs_repair, não realiza o reparo diretamente. #xfs #xfs_repair #fsck"

- id: "104-057"
  topic: "104.3"
  question: "Qual o resultado da execução do comando \"mount -a\"?"
  options:
    - "Todas as partições do sistema serão montadas"
    - "Todas as partições do arquivo /etc/fstab serão montadas, exceto as que possuem a opção \"noauto\""
    - "Todas as partições atualmente montadas no sistema serão exibidas"
    - "Ocorrerá um erro de sintaxe pela falta da especificação de uma partição"
  answer: 2
  comment: "A opção -a do mount monta todas as partições listadas no /etc/fstab, exceto as que contêm a opção 'noauto'. Executado sem nenhuma opção, o mount apenas exibe as partições atualmente montadas. #mount #fstab"

- id: "104-058"
  topic: "104.5"
  question: "Qual comando permitirá que o arquivo.txt possa ser lido e alterado por seu dono e pelos membros de seu grupo, mas nenhum outro usuário do sistema possa realizar essas operações?"
  options:
    - "chmod 644 arquivo.txt"
    - "chmod 660 arquivo.txt"
    - "chmod 550 arquivo.txt"
    - "chmod 664 arquivo.txt"
  answer: 2
  comment: "O valor octal 6 corresponde às permissões r (leitura) e w (escrita). O chmod 660 concede leitura e escrita ao dono (6) e ao grupo (6), sem nenhuma permissão para outros (0). O 644 daria leitura para outros. O 664 daria leitura para outros também. O 550 concede leitura e execução, sem escrita. #chmod #chmod"

- id: "104-059"
  topic: "104.5"
  question: "Considerando o valor atual do umask como 022, qual será a permissão de todo novo diretório criado?"
  options:
    - "rwxr-xr-x"
    - "rwxrw-rw-"
    - "rw-r--r--"
    - "rwxrwxr-x"
  answer: 1
  comment: "As permissões de novos arquivos e diretórios são definidas subtraindo o umask do padrão máximo: 666 para arquivos e 777 para diretórios. Com umask 022: 777 - 022 = 755 (rwxr-xr-x). Para arquivos: 666 - 022 = 644 (rw-r--r--). #umask #chmod"

- id: "104-060"
  topic: "104.3"
  question: "O administrador deseja analisar e automaticamente reparar os dados da partição /dev/sdb1 (ext3), que no momento está montada. Qual o primeiro comando que deve ser executado?"
  options:
    - "fsck -y /dev/sdb1"
    - "fsck -t ext3 /dev/sdb1"
    - "mount -a /dev/sdb1"
    - "umount /dev/sdb1"
  answer: 4
  comment: "O fsck exige que a partição esteja desmontada para verificá-la e repará-la com segurança. Portanto, o primeiro passo é executar umount /dev/sdb1. Após a desmontagem, fsck -y /dev/sdb1 pode ser usado para verificar e corrigir automaticamente os erros encontrados. #fsck #umount #ext3"

- id: "104-061"
  topic: "104.5"
  question: "Qual o resultado do uso do bit especial \"Sticky\" nas permissões de um diretório?"
  options:
    - "Permite que qualquer usuário do sistema possa acessar o diretório"
    - "Permite que qualquer usuário do sistema possa executar os arquivos presentes nesse diretório"
    - "Faz com que todos os arquivos e subdiretórios desse diretório só possam ser apagados por seus respectivos donos e pelo root, mesmo que o diretório tenha permissão de escrita para todos"
    - "Faz com que todos os arquivos e subdiretórios desse diretório possam ser apagados por quaisquer usuários, mesmo que o diretório não tenha permissão de escrita para todos"
  answer: 3
  comment: "O bit Sticky em diretórios impede que usuários apaguem ou renomeiem arquivos de outros usuários, mesmo tendo permissão de escrita no diretório. O exemplo clássico é o /tmp (drwxrwxrwt): qualquer usuário pode criar arquivos, mas apenas o dono e o root podem removê-los. #sticky #chmod"

- id: "104-062"
  topic: "104.6"
  question: "O arquivo file1 é um link físico do arquivo file2. Qual das afirmações abaixo são verdadeiras? (Selecione TRÊS Respostas Corretas)"
  options:
    - "Ao apagar file1, o arquivo file2 também será removido"
    - "Ao apagar file2, o link file1 será quebrado impedindo o acesso aos dados"
    - "file1 e file2 compartilham o mesmo inode"
    - "file1 e file2 devem obrigatoriamente estar na mesma partição"
    - "As mesmas permissões aplicadas ao arquivo file1 serão válidas no arquivo file2"
  answer: [3, 4, 5]
  comment: "Um link físico (hard link) é uma entrada de diretório adicional que aponta para o mesmo inode. Apagar um dos arquivos apenas remove a entrada, os dados persistem enquanto houver ao menos um link. Ambos devem estar na mesma partição (diferente do link simbólico). Como permissões são armazenadas no inode, ambos compartilham as mesmas permissões. #inode #chmod"

- id: "104-063"
  topic: "104.7"
  question: "De acordo com o FHS, em qual diretório são encontrados os arquivos de manuais do sistema?"
  options:
    - "/usr/share"
    - "/usr/lib"
    - "/var/doc"
    - "/opt/man"
    - "/var/share"
  answer: 1
  comment: "Segundo o FHS (Filesystem Hierarchy Standard), o /usr/share contém dados independentes de arquitetura compartilhados entre usuários, incluindo /usr/share/man (páginas de manual) e /usr/share/doc (documentação dos pacotes). #fhs #man"

- id: "104-064"
  topic: "104.7"
  type: "discursive"
  question: "Qual comando procura e retorna o caminho completo apenas de arquivos presentes nos diretórios listados na variável de ambiente PATH? (Informe apenas o comando, sem o caminho ou argumentos)"
  answer: "which"
  comment: "O which busca arquivos executáveis apenas nos diretórios da variável PATH, retornando o caminho completo do primeiro encontrado. O whereis localiza binários, bibliotecas, fontes e manuais. O locate usa uma base de dados interna com todos os arquivos do sistema. O apropos retorna descrições de comandos relacionados a um termo. #which"

- id: "104-065"
  topic: "104.6"
  question: "Qual a função do seguinte comando?\n\nln arquivo1 arquivo2"
  options:
    - "Criar um link simbólico chamado arquivo1 apontando para arquivo2"
    - "Criar um hard link chamado arquivo1 que aponta para arquivo2"
    - "Criar um link simbólico para arquivo1, chamado arquivo2"
    - "Criar um hard link para arquivo1, chamado arquivo2"
  answer: 4
  comment: "O comando ln sem opções cria um hard link (link físico). A sintaxe é: ln <alvo> <nome do link>. Portanto, 'ln arquivo1 arquivo2' cria um hard link chamado arquivo2 que aponta para arquivo1. Para criar um link simbólico, seria necessário usar ln -s. #ln"

- id: "104-066"
  topic: "104.1"
  type: "discursive"
  question: "Qual comando é utilizado para habilitar o swap em determinado dispositivo (partição ou arquivo)? (Informe apenas o nome do comando, sem o caminho ou argumentos)"
  answer: "swapon"
  comment: "O swapon ativa um dispositivo ou arquivo como área de swap do sistema. O swapoff faz o inverso, desativando o swap do dispositivo. A área de swap é usada como extensão da memória RAM quando ela está esgotada. #swapon #swapoff #swap"

- id: "104-067"
  topic: "104.1"
  question: "O administrador deseja utilizar na partição /home de seu servidor um sistema de arquivos que permita nativamente o uso de subvolumes e snapshots. Das opções abaixo, qual é uma opção válida?"
  options:
    - "exFAT"
    - "VFAT"
    - "ext4"
    - "Btrfs"
    - "XFS"
  answer: 4
  comment: "O Btrfs (B-tree filesystem) suporta nativamente subvolumes, snapshots, RAID multi-device e compressão transparente de dados. O ext4, XFS, exFAT e VFAT não possuem suporte nativo a subvolumes e snapshots. #btrfs #btrfs #btrfs"

- id: "104-068"
  topic: "104.3"
  question: "Qual comando deve ser utilizado para montar manualmente o dispositivo /dev/sdb1 no diretório /mnt/backup/ ?"
  options:
    - "mount /dev/sdb1 /mnt/backup/"
    - "mkfs /dev/sdb1 /mnt/backup"
    - "mount /mnt/backup /dev/sdb1"
    - "fstab /dev/sdb1 /mnt/backup"
  answer: 1
  comment: "O mount é o comando utilizado para montar manualmente uma partição a um diretório, sendo a sintaxe: mount <dispositivo> <ponto de montagem>. #mount"

- id: "104-069"
  topic: "104.2"
  question: "Em uma partição que utiliza o sistema de arquivos XFS, qual comando é utilizado especificamente para que os dados dentro da partição sejam reorganizados?"
  options:
    - "xfs_repair"
    - "xfs_db"
    - "fsck.xfs"
    - "xfs_fsr"
    - "xfs_reorg"
  answer: 4
  comment: "O xfs_fsr (de FileSystem Reorganizer), tem a função de melhorar a organização do sistema de arquivos XFS. O xfs_db é uma ferramenta de Debug para partições XFS. O xfs_repair tem a função de reparar um filesystem XFS, de forma similar ao fsck para outros filesystems. #xfs #xfs_fsr #filesystem"

- id: "104-070"
  topic: "104.2"
  question: "Qual dos seguintes comandos irá alterar o intervalo máximo de verificações da partição /dev/sda1 para 30 dias?"
  options:
    - "tune2fs -j 30 /dev/sda1"
    - "tune2fs -i 30 /dev/sda1"
    - "tune2fs -m 30d /dev/sda1"
    - "tune2fs -c 1m /dev/sda1"
    - "tune2fs -d 30 /dev/sda1"
  answer: 2
  comment: "A opção -i do tune2fs altera o parâmetro \"interval-between-checks\", que é referente ao intervalo máximo entre checagens de uma partição. Podem ser utilizados os sufixos d para dias, m para meses e w para semanas, se nenhum for informado são considerados dias. #tune2fs #fsck #filesystem #ext2 #ext3 #ext4"

- id: "104-071"
  topic: "104.1"
  question: "Quais comandos podem ser utilizados para se criar partições do tipo GPT? (Selecione TRÊS Respostas Corretas)"
  options:
    - "fdisk"
    - "gdisk"
    - "parted"
    - "mkfs"
    - "tune2fs"
  answer: [1, 2, 3]
  comment: "O fdisk e o parted podem criar partições do tipo MBR e GPT. O gdisk é específico para o tipo GPT. #gpt #fdisk #gdisk #parted #partição"

- id: "104-072"
  topic: "104.1"
  question: "Quais comandos podem ser utilizados para criar um sistema de arquivos do tipo ext3? (Selecione TRÊS Respostas Corretas)"
  options:
    - "mkfs -t ext3"
    - "mkfs.ext3"
    - "mke2fs -j"
    - "mke3fs"
    - "mkfs --ext3"
  answer: [1, 2, 3]
  comment: "A opção -t do mkfs é utilizada para definir o tipo de filesystem a ser utilizado, se não for informado o padrão é ext2. Além disso pode ser utilizado diretamente o mkfs.ext3, sem argumentos. A opção -j do mke2fs cria um sistema de arquivos com journal, que na prática é o ext3. #mkfs #ext3 #mke2fs #filesystem"

- id: "104-073"
  topic: "104.5"
  question: "Qual bit de acesso permite que um arquivo binário seja executado por qualquer usuário do sistema como se este fosse o dono do arquivo?"
  options:
    - "SUID"
    - "SGID"
    - "Sticky"
    - "Special"
  answer: 1
  comment: "O SUID implementa a permissão descrita, ele é representado pelo caractere \"s\" na posição da permissão \"x\" do usuário dono do arquivo e pode ser implementado pelo comando \"chmod u+s arquivo\". #SUID #SGID #sticky"

- id: "104-074"
  topic: "104.3"
  question: "Qual opção deve ser utilizada no arquivo /etc/fstab para que determinada partição não seja automaticamente montada quando o sistema é iniciado?"
  options:
    - "umount"
    - "noauto"
    - "auto"
    - "ro"
    - "users"
  answer: 2
  comment: "A opção \"noauto\" diz que a partição deve sempre ser montada manualmente, o \"auto\" tem o efeito contrário. #fstab #mount #noauto #montagem"

- id: "104-075"
  topic: "104.3"
  question: "Quantos campos devem estar presentes em cada linha de configuração do arquivo /etc/fstab?"
  options:
    - "3"
    - "4"
    - "5"
    - "6"
    - "7"
  answer: 4
  comment: "Cada linha do arquivo /etc/fstab deve conter 6 campos: <file system>, <mount point>, <type>, <options>, <dump>, <pass>. #fstab #filesystem #montagem"

- id: "104-076"
  topic: "104.5"
  question: "Qual comando irá definir o usuário analista1 e grupo dev como proprietários do arquivo controle_ambiente?"
  options:
    - "chown analista1 dev controle_ambiente"
    - "chown dev:analista1 controle_ambiente"
    - "chown -u analista1 -g dev controle_ambiente"
    - "chown analista1.dev controle_ambiente"
  answer: 4
  comment: "O chown pode ser utilizado para definir o usuário e o grupo proprietário, aceitando as seguintes sintaxes: chown <usuario>:<grupo> <arquivo> ou chown <usuario>.<grupo> <arquivo>, sendo que o <grupo> pode ser omitido caso não se deseje alterá-lo. #chown"

- id: "104-077"
  topic: "104.5"
  question: "Qual comando pode ser executado para habilitar o SGID no diretório arquivos?"
  options:
    - "chgrp SGID arquivos"
    - "chmod u+s arquivos"
    - "chmod 1644 arquivos"
    - "chmod g+s arquivos"
  answer: 4
  comment: "O SGID é representado pela substituição do \"x\" pelo \"s\" nas permissões do grupo. O chmod g+s habilita o SGID, enquanto chmod u+s habilita o SUID. #SGID #chmod"

- id: "104-078"
  topic: "104.6"
  question: "Como será definido o tamanho de um arquivo que é um link simbólico?"
  options:
    - "O link simbólico terá o mesmo tamanho que o arquivo para o qual ele aponta"
    - "O tamanho do link simbólico será exatamente igual à quantidade de caracteres que formam o destino referenciado"
    - "O link simbólico terá sempre o tamanho de 1 byte"
    - "Um link simbólico terá sempre o tamanho de 4096 bytes"
  answer: 2
  comment: "Um link simbólico nada mais é que um apontamento para outro arquivo, por isso seu conteúdo é apenas o caminho para seu destino. #symlink #ln"

- id: "104-079"
  topic: "104.6"
  question: "Na tentativa de criação de um link, foi retornada a seguinte mensagem de erro. Qual a possível causa do erro?"
  code: "Invalid cross-device link"
  options:
    - "Tentou-se criar um link simbólico para um diretório"
    - "Tentou-se criar um link simbólico para um arquivo presente em outra partição"
    - "Tentou-se criar um link físico para um diretório"
    - "Tentou-se criar um link físico para um arquivo presente em outra partição"
  answer: 4
  comment: "Links físicos não podem apontar para arquivos em outras partições, apresentando o erro mencionado. Também não podem apontar para diretórios, mas nesse caso a mensagem de erro seria \"hard link not allowed for directory\". Por outro lado, links simbólicos podem referenciar diretórios e arquivos em outras partições. #hardlink #symlink"


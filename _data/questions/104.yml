- id: "104-081"
  topic: "104.7"
  question: "Em quais diretórios de um sistema Linux podem estar localizados arquivos binários que só podem ser executados pelo usuário root? (Selecione DUAS Respostas Corretas)"
  options:
    - "/bin"

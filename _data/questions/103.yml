- id: "103-069"
  topic: "103.4"
  question: "Qual comando irá enviar ao programa “gera-relatorio” o arquivo “dados” como entrada e registrar os logs de erro no arquivo “erros.log”?"
  options:
    - "gera-relatorio > dados 2> erros.log"
    - "gera-relatorio < dados >> erros.log"
    - "dados > gera-relatorio > erros.log"

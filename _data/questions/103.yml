- id: "103-066"
  topic: "103.2"
  question: "Qual caractere(s) deve(m) ser removido(s) de um arquivo texto que está utilizando o padrão de quebras de linha CR-LF para que ele passe a utilizar o padrão do Linux?"
  options:
    - "\\r"
    - "\\n"
    - "\\r\\n"
    - "^M"
    - "\\d"
  answer: 1
 comment: "Para alterar o padrão de quebra de linha CR-LF, típico de sistemas Windows, para o padrão utilizado no Linux, LF, basta remover o caractere equivalente ao CR representado pelo \\r. Isso normalmente é feito através do comando tr, por exemplo: tr -d‘\\r’ < origem.txt > destino.txt #tr"

- id: "103-067"
  topic: "103.3"
  question: "Dentre os arquivos abaixo, quais serão listados ao se utilizar o comando ls da seguinte maneira: # ls -l Exercicios[1-5].{txt,doc} (Selecione DUAS Respostas Corretas)"

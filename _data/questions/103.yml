- id: "103-028"
  topic: "103.2"  
  question: "Como você pode descrever a função dos seguintes comandos? foo | bar > foobar"
  options:
    - "O comando foobar recebe sua entrada do comando bar"
    - "O comando bar escreve sua saída no arquivo foobar"
    - "O comando foo escreve sua saída no arquivo bar"
    - "O comando foo redireciona sua saída para o comando bar"
    - "O STDIN de foo está conectado ao STDOUT de bar"
  answer: [2, 4]
 comment: "O pipe (|) conecta o STDOUT (saída padrão) de foo ao STDIN (entrada padrão) de bar. O caractere > redireciona o STDOUT final de bar para o arquivo físico foobar. #stdout"

- id: "103-029"
  topic: "103.1"  
  question: "Como você descreveria a seguinte linha de comando? foo &| bar"
  options:
    - "O comando foo é iniciado em segundo plano e redireciona sua saída para o comando bar."
    - "O comando bar só é processado se o comando foo não retornar erro."
    - "O comando bar só é processado se o comando foo retornar um erro."
    - "O comando bar é processado após o comando foo, independentemente de erros."
    - "Esta não é uma linha de comando válida."
  answer: 5
 comment: "A combinação &| não é um operador válido no Bash ou SH. O & envia um comando para o background e encerra sua definição lógica, enquanto o pipe | exige um comando à sua esquerda para redirecionar o fluxo de dados. O operador correto para redirecionar stdout e stderr simultaneamente seria |&. #bash"

- id: "103-030"
  topic: "103.3"  
  question: "O que o seguinte comando resultaria?"
  code: "cp $(find . -size -12k) /tmp"
  options:
    - "O arquivo com o nome armazenado na variável \"$(find . -size -12k)\" será copiado para /tmp."
    - "Todos os arquivos no diretório atual que são menores que 12 KByte serão copiados para /tmp."
    - "Todos os arquivos no diretório atual e em todos os subdiretórios incluídos que são menores que 12 KByte serão copiados para /tmp."
    - "Todos os arquivos no diretório atual e em todos os subdiretórios incluídos que são menores que 12 KByte serão copiados para /tmp. A estrutura de diretórios também será copiada."
    - "Esta não é uma linha de comando válida."
  answer: 3
 comment: "O comando usa a substituição de comando $(...) para passar a saída do find como argumentos para o cp. O find busca recursivamente (diretório atual e subdiretórios) por arquivos menores que 12KB (-size -12k). O cp apenas copia os arquivos para a raiz de /tmp, sem recriar a estrutura de pastas original. #find"

- id: "103-031"
  topic: "103.2"  
  question: "Como você poderia obter a seguinte informação: Qual GID pertence ao grupo padrão do usuário foo?"
  options:
    - "defgrp foo"
    - "defgrp -n foo"
    - "grep foo /etc/passwd | cut -d: -f4"
    - "getuserinfo -gid foo"
    - "grep foo /etc/group | cut -d: -f3"
  answer: 3

- id: "103-068"
  topic: "103.3"
  question: "Qual comando é capaz de determinar o tipo de um arquivo baseado em seus padrões de texto e formato?"
  options:
    - "type"
    - "format"
    - "file"
    - "whatis"
    - "info"

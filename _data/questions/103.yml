- id: "103-070"
  topic: "103.3"
  question: "Quais opções devem ser utilizadas no comando find para encontrar todos os arquivos modificados nos últimos 7 dias no diretório /etc?"
  options:
    - "find /etc -ctime +7"
    - "find /etc -mtime +7"
    - "find /etc -ctime 7"
    - "find /etc -mtime -7"
  answer: 4
 comment: "O find possui 3 tipos de busca por tempo: ctime (change time) = última mudança de conteúdo e/ou propriedades, mtime (modification time) = última mudança de conteúdo, atime (access time) = última vez que o arquivo foi acessado. O sinal de menos (-) indica 'menos que' ou 'nos últimos'. #find #mtime"

- id: "103-071"
  topic: "103.3"
  question: "Qual comando irá remover o diretório aula1 e todos os seus arquivos e subdiretórios?"
  options:
    - "rm -r aula1"
    - "rmdir aula1"
    - "rmdir -r aula1"
    - "rm -f aula1"
  answer: 1
 comment: "O comando rm com a opção -r remove um diretório recursivamente, ou seja, remove o diretório e tudo que está dentro. O rmdir é utilizado apenas para remover diretórios vazios. #rm #rmdir"

- id: "103-072"
  topic: "103.4"
  type: "discursive"
  question: "Qual comando tem a função de a partir de uma entrada padrão, construir e executar determinado comando uma ou mais vezes? (Informe apenas o nome do comando, sem o caminho ou argumentos)"
  answer: "xargs"
 comment: "O xargs é usado para construir e executar comandos a partir de uma entrada padrão. Ele converte a entrada recebida em argumentos para um comando e o executa. #xargs #stdin"

- id: "103-073"
  topic: "103.8"
  question: "No VI, quais dos comandos abaixo podem ser utilizados para salvar um documento e em seguida sair do editor de texto?"
  options:
    - ":q!"
    - ":wq"
    - ":x"
    - "ZZ"
    - "XX"
  answer: [2, 3, 4]
 comment: "Os comandos :wq, :x e ZZ irão salvar o documento e sair do VI. :q! sai sem salvar e XX não tem nenhuma função. #vi #editor"

- id: "103-074"
  topic: "103.7"
  question: "Qual dos seguintes comandos vai analisar o arquivo entrada.txt e substituir na sua saída todas as referências da palavra Linux por LINUX?"
  options:
    - "sed /Linux/LINUX/g entrada.txt"
    - "sed ‘/Linux/LINUX/g’ entrada.txt"
    - "sed ‘s/Linux/LINUX/’ entrada.txt"
    - "sed ‘s/Linux/LINUX/g’ entrada.txt"
  answer: 4
 comment: "No sed, a instrução deve estar entre aspas simples. Outro ponto importante é o“g”, de global, no final da expressão; sem ela, apenas a primeira ocorrência de cada linha seria substituída, e não todas as ocorrências. #sed #regex"

- id: "103-075"
  topic: "103.8"
  type: "discursive"
  question: "No editor vi, qual comando irá copiar para o buffer a linha atual e as 5 linhas seguintes? (Informe o comando do vi sem espaços)"
  answer: "6yy"
 comment: "Ao pressionar yy a linha atual é copiada. Para copiar a linha atual e as 5 seguintes (totalizando 6 linhas), utiliza-se 6yy ou y6y. Para colar, utiliza-se o comando p. #vi"

- id: "103-076"
  topic: "103.5"
  question: "Qual o código do sinal enviado a um processo quando ele é interrompido através do uso das teclas Ctrl C?"
  options:
    - "1"
    - "2"
    - "9"
    - "15"
    - "16"
  answer: 2
 comment: "O sinal 2, ou SIGINT, é associado ao Ctrl C, e interrompe a execução de um processo. #signal #sigint"

- id: "103-077"
  topic: "103.8"
  question: "Durante a edição de um arquivo no vi, o arquivo foi alterado por outro processo ou usuário. Qual opção deve ser utilizada para reabrir o arquivo com o novo conteúdo, sem sair do vi?"
  options:
    - ":o"
    - ":e"
    - ":wq"
    - ":i"
  answer: 2
 comment: "O comando :e abre novamente a última versão salva do arquivo em edição, sem sair do vi. #vi"

- id: "103-078"
  topic: "103.5"
  question: "Quais opções devem ser usadas junto ao comando ps para que sejam exibidos os processos de todos os usuários do sistema, vinculados (ou não) a qualquer terminal, exibindo inclusive o nome do usuário dono de cada processo?"
  options:
    - "aux"
    - "alx"
    - "fx"
    - "ef"
  answer: 1
 comment: "A opção“a” mostra os processos de outros usuários mas vinculados ao terminal atual. A opção“u” habilita o formato de usuário, exibindo o nome do usuário dono de cada processo assim como outros detalhes do processo. A opção“x” mostra os processos de todos os terminais, além de processos que não estão associados a nenhum terminal. #ps"

- id: "103-079"
  topic: "103.5"
  question: "Quais ferramentas podem ser utilizadas para, a partir de uma única sessão no shell, ser possível criar e gerenciar diferentes terminais? (Selecione DUAS Respostas Corretas)"
  options:
    - "screen"
    - "htop"
    - "jobs"
    - "tmux"
    - "split"
  answer: [1, 4]
 comment: "Tanto o tmux quanto o screen permitem que usuário utilize uma única tela para abrir e gerenciar diversos terminais, com atividades independentes, permitindo inclusive o controle de janelas, painéis e etc. #tmux #screen"

- id: "103-080"
  topic: "103.6"
  question: "Quais comandos podem ser usados para alterar a prioridade de execução de um programa que já esta em execução? (Selecione DUAS Respostas Corretas)"
  options:
    - "top"
    - "nice"
    - "renice"
    - "chmod"
    - "jobs"
  answer: [1, 3]
 comment: "Os comandos renice e top podem ser utilizados para alterar o valor de NICE de um processo já em execução. O comando nice é utilizado para definir o valor ao se iniciar um processo. #nice #renice #top"

- id: "103-081"
  topic: "103.1"
  question: "Qual comando pode ser utilizado para exibir apenas as variáveis exportadas de uma sessão do shell?"
  options:
    - "env"
    - "set"
    - "setenv"
    - "listenv"
    - "alias"
  answer: 1
 comment: "O comando env exibe apenas as variáveis de ambiente exportadas da sessão atual do shell. O comando set exibe todas as variáveis, incluindo as locais (não exportadas). Os comandos setenv, listenv e alias não têm essa função. #env #set #shell"

- id: "103-082"
  topic: "103.1"
  question: "Como é possível escrever a frase \"Agora são XX horas e YY minutos\", de forma que um único comando sempre mostre as horas e minutos atualizados a partir do comando date?"
  options:
    - "echo \"Agora são `date +%H` horas e $(date +%M) minutos\""
    - "echo Agora são \"date+%H\" horas e \"date +%M\" minutos"
    - "echo \"Agora são `date +H` horas e `date +M` minutos\""
    - "echo 'Agora são `date +%H` horas e `date +%M` minutos'"
  answer: 1
 comment: "Há duas sintaxes para executar um subcomando dentro de outro: crases (`comando`) ou a notação $( ). Ambas funcionam dentro de aspas duplas. Aspas simples impedem a expansão de subcomandos. As opções do date exigem o prefixo %, portanto +%H e +%M são as formas corretas. #echo #date #shell"

- id: "103-083"
  topic: "103.1"
  question: "Qual arquivo presente no diretório de um usuário armazena o histórico de comandos digitados?"
  options:
    - ".bash_profile"
    - ".bash_history"
    - ".history_profile"
    - ".bashrc_history"
    - ".histfile"
  answer: 2
 comment: "Por padrão, o arquivo .bash_history presente no $HOME do usuário armazena o histórico de execução de comandos, sendo atualizado ao final de cada sessão. O número de entradas é controlado pela variável HISTSIZE e o arquivo pela variável HISTFILE. #bash #history #bash_history #shell"

- id: "103-084"
  topic: "103.1"
  question: "Qual comando irá retornar o release do kernel utilizado pelo sistema?"
  options:
    - "uptime"
    - "kernel --version"
    - "hostname"
    - "uname -r"
  answer: 4
 comment: "O comando uname disponibiliza várias informações do sistema. A opção -r exibe o kernel-release (versão do kernel em execução). Outras opções úteis: -a (todas as informações), -s (nome do kernel), -m (arquitetura da máquina). #uname #kernel"

- id: "103-085"
  topic: "103.2"
  question: "Qual opção do comando tr substitui uma sequência de repetições de um caractere por apenas uma única ocorrência deste mesmo caractere?"
  options:
    - "-s"
    - "-n"
    - "-c"
    - "--unique"
    - "--truncate"
  answer: 1
 comment: "A opção -s (ou --squeeze-repeats) do comando tr substitui sequências repetidas de um caractere por uma única ocorrência. Exemplo: tr -s ' ' < entrada.txt > saida.txt comprime múltiplos espaços em um único. #tr"

- id: "103-086"
  topic: "103.3"
  question: "Qual comando irá retornar todos os arquivos que comecem com a string \"report\" e terminem com \"csv\" localizados no diretório /usr?"
  options:
    - "find -name /usr \"report*csv\""
    - "find /usr report*csv"
    - "find /usr -name \"report*csv\""
    - "find -dir /usr -iname report*csv"
  answer: 3
 comment: "A sintaxe correta do find é: find <diretório> <opção> <padrão>. A opção -name filtra por nome (case sensitive) e -iname por nome sem distinção de maiúsculas. O * representa qualquer sequência de caracteres. As aspas são necessárias para evitar que o shell expanda o glob antes do find. #find"

- id: "103-087"
  topic: "103.3"
  question: "Qual opção utilizada no comando rm vai pedir uma confirmação do usuário sempre antes de remover qualquer arquivo ou diretório?"
  options:
    - "-f"
    - "-i"
    - "-q"
    - "-y"
    - "-p"
  answer: 2
 comment: "A opção -i (interactive) do rm habilita o modo interativo, solicitando confirmação antes de cada remoção. A opção -f (force) tem efeito oposto, suprimindo qualquer confirmação e ignorando arquivos inexistentes. As opções -q, -y e -p não existem no rm. #rm"

- id: "103-088"
  topic: "103.2"
  question: "Dos comandos a seguir, quais podem ser utilizados para numerar as linhas do arquivo texto resultado.txt, desconsiderando as linhas em branco? (Selecione DUAS Respostas Corretas)"
  options:
    - "tac resultado.txt"
    - "cat -n resultado.txt"
    - "cat -b resultado.txt"
    - "nl resultado.txt"
    - "nl -b resultado.txt"
  answer: [3, 4]
 comment: "O cat -b numera apenas as linhas não em branco. O nl sem parâmetros também numera apenas as linhas não em branco por padrão. O cat -n numera todas as linhas, incluindo as em branco. O tac apenas inverte a ordem das linhas. #cat #nl"

- id: "103-089"
  topic: "103.4"
  question: "Quais das opções a seguir exibem na tela a palavra \"linux\"? (Selecione TRÊS Respostas Corretas)"
  options:
    - "echo < linux"
    - "cat <<< linux"
    - "echo <<< linux"
    - "echo linux | cat"
    - "echo linux 2> file"
  answer: [2, 4, 5]
 comment: "Em 'cat <<< linux', o here-string envia o texto diretamente como stdin do cat, que o exibe. Em 'echo linux | cat', a saída do echo é passada via pipe ao cat. Em 'echo linux 2> file', apenas o stderr é redirecionado ao arquivo; o stdout (a palavra linux) ainda vai para a tela. O 'echo < linux' tenta usar um arquivo chamado linux como stdin do echo, que o ignora. #pipe #stdout #stderr"

- id: "103-090"
  topic: "103.4"
  question: "O usuário deseja que ao executar o comando myapp, o resultado seja exibido na tela e ao mesmo tempo escrito no arquivo log.out, sem sobrescrever o conteúdo prévio. Qual comando deve ser utilizado?"
  options:
    - "myapp >> log.out"
    - "myapp | tee log.out"
    - "myapp | tee -a log.out"
    - "myapp >> log.out | tee"
  answer: 3
 comment: "O tee exibe a saída na tela e simultaneamente a grava em um arquivo. Por padrão, sobrescreve o arquivo existente. A opção -a (append) faz com que o tee adicione a saída ao final do arquivo sem apagar o conteúdo anterior. O >> apenas redireciona para o arquivo sem exibir na tela. #tee #pipe"

- id: "103-091"
  topic: "103.3"
  question: "Quais funções o comando touch pode realizar? (Selecionar DUAS Respostas Corretas)"
  options:
    - "Criar um novo arquivo sem nenhum conteúdo"
    - "Alterar a data de modificação de um arquivo já existente"
    - "Proteger o arquivo impedindo sua remoção"
    - "Alterar o dono do arquivo"
    - "Criar um link para um arquivo"
  answer: [1, 2]
 comment: "O comando touch tem duas funções principais: criar um arquivo vazio caso ele não exista, e atualizar os timestamps (data de acesso e modificação) de um arquivo já existente. Não altera permissões, dono nem cria links. #touch"

- id: "103-092"
  topic: "103.3"
  question: "Quais comandos podem ser utilizados para extrair o conteúdo do arquivo backup.bz2? (Selecione DUAS Respostas Corretas)"
  options:
    - "bunzip2 backup.bz2"
    - "unzip backup.bz2"
    - "bzip2 -d backup.bz2"
    - "xz -d backup.bz2"
    - "gunzip backup.bz2"
  answer: [1, 3]
 comment: "Arquivos .bz2 são compactados com bzip2. Para descompactar, usa-se o comando específico bunzip2 ou o próprio bzip2 com a opção -d (decompress). O unzip é para arquivos .zip, o gunzip para .gz e o xz para .xz. #bzip2 #bunzip2"

- id: "103-093"
  topic: "103.6"
  question: "Quando iniciamos um processo usando o nice mas sem informar nenhum valor, qual o valor de nice é atribuído ao processo?"
  options:
    - "0"
    - "10"
    - "-19"
    - "19"
    - "20"
  answer: 2
 comment: "O comando nice, sem valor explícito, atribui o valor padrão de 10 ao processo, reduzindo sua prioridade. O valor 0 é o nice padrão de processos iniciados sem o nice. O intervalo válido vai de -20 (maior prioridade, exclusivo do root) a 19 (menor prioridade). #nice"

- id: "103-094"
  topic: "103.4"
  question: "Qual símbolo faz com que a saída padrão de um primeiro comando seja utilizada como entrada do comando seguinte?"
  options:
    - "|"
    - "&"
    - ";"
    - ">"
    - "<"
  answer: 1
 comment: "O símbolo | (pipe) conecta a saída padrão (stdout) do primeiro comando à entrada padrão (stdin) do segundo. O & executa um comando em background. O ; executa comandos em sequência independentemente. O > redireciona stdout para um arquivo. O < usa o conteúdo de um arquivo como stdin. #pipe #stdout #stdin #shell"

- id: "103-095"
  topic: "103.5"
  question: "Qual comando do bash coloca em foreground na sessão atual um job que está em execução em background?"
  options:
    - "bg"
    - "fg"
    - "jobs"
    - "nohup"
    - "watch"
  answer: 2
 comment: "O comando fg traz um job em background para o foreground da sessão atual. O bg reinicia um processo parado mantendo-o em background. O jobs lista os jobs ativos na sessão. O nohup executa um comando imune ao sinal SIGHUP (logout). O watch executa um comando repetidamente em intervalos. #fg #bg #jobs #bash"

- id: "103-096"
  topic: "103.5"
  question: "Qual o sinal enviado por padrão pelo comando kill a um processo?"
  options:
    - "SIGKILL"
    - "SIGINT"
    - "SIGTERM"
    - "SIGSTP"
    - "SIGHUP"
  answer: 3
 comment: "Sem nenhum parâmetro, o kill envia o sinal SIGTERM (código 15), que solicita o encerramento do processo de forma graciosa, permitindo que ele finalize suas tarefas antes de sair. O SIGKILL (9) encerra o processo imediatamente sem possibilidade de tratamento. #kill #sigterm"

- id: "103-097"
  topic: "103.4"
  question: "Qual comando irá redirecionar o stdout do comando para o arquivo saida.out e o stderr para o arquivo saida.err?"
  options:
    - "comando > saida.out >> saida.err"
    - "comando > saida.err 2> saida.out"
    - "comando > saida.out 2> saida.err"
    - "comando > saida.err >> saida.out"
  answer: 3
 comment: "No Linux há 3 descritores de arquivo padrão: stdin (0), stdout (1) e stderr (2). O > redireciona o stdout (equivalente a 1>) e o 2> redireciona o stderr. Portanto, 'comando > saida.out 2> saida.err' envia a saída padrão para saida.out e os erros para saida.err. #stdout #stderr"

- id: "103-098"
  topic: "103.5"
  question: "Qual comando é utilizado para pesquisar e exibir o PID de processos baseado no nome de execução e outros atributos?"
  options:
    - "jobs"
    - "bg"
    - "pkill"
    - "fgrep"
    - "pgrep"
  answer: 5
 comment: "O pgrep busca processos por nome ou atributos (como usuário) e exibe seus PIDs. O pkill funciona de forma similar, mas em vez de exibir, envia sinais aos processos encontrados. O jobs lista jobs da sessão atual, o bg retoma processos em background e o fgrep é um filtro de texto. #pgrep #pkill #pid"

- id: "103-099"
  topic: "103.6"
  type: "discursive"
  question: "Qual comando tem a única finalidade de alterar o valor do NICE de um processo em execução? (Informe apenas o comando, sem o caminho ou argumentos)"
  answer: "renice"
 comment: "O renice altera o valor de NICE de um processo já em execução, impactando sua prioridade de escalonamento. O nice é usado para definir o NICE ao iniciar um processo. O top também permite alterar o NICE interativamente, mas não tem essa como única finalidade. #renice #nice"

- id: "103-100"
  topic: "103.7"
  question: "Em uma expressão regular, qual símbolo determina que o caractere anterior é opcional, podendo ocorrer nenhuma ou apenas uma vez?"
  options:
    - "+"
    - "*"
    - "."
    - "?"
    - "^"
  answer: 4
 comment: "O ? indica que o caractere anterior pode ocorrer zero ou uma vez (opcional). O + exige uma ou mais ocorrências. O * permite zero ou mais ocorrências. O . representa qualquer caractere único. O ^ ancora o padrão ao início da linha. #regex #grep"

- id: "103-101"
  topic: "103.7"
  question: "Qual dos comandos abaixo não é capaz de interpretar expressões regulares no shell?"
  options:
    - "fgrep"
    - "grep"
    - "egrep"
    - "sed"
  answer: 1
 comment: "O fgrep (fixed grep) interpreta o padrão como string literal, não como expressão regular. É equivalente a grep -F. Os demais — grep, egrep (grep -E) e sed — suportam expressões regulares. #fgrep #grep #egrep #sed #regex"

- id: "103-102"
  topic: "103.7"
  question: "Qual comando pode ser utilizado para contar a quantidade de linhas em que a palavra \"Linux\" aparece no arquivo resultado.log?"
  options:
    - "fgrep Linux resultado.log"
    - "grep -l \"Linux\" resultado.log"
    - "grep -c Linux resultado.log"
    - "egrep -n \"Linux\" resultado.log"
  answer: 3
 comment: "A opção -c do grep conta o número de linhas que contêm o padrão. A opção -l lista apenas os nomes dos arquivos que possuem o padrão. A opção -n exibe o número de cada linha correspondente, mas não conta. O fgrep não aceita expressões regulares. #grep #regex"

- id: "103-103"
  topic: "103.8"
  question: "Em um sistema cujo editor de texto padrão é o nano, um usuário específico deseja que em suas sessões do shell, o editor seja o vim. Qual variável de ambiente pode ser configurada para essa finalidade?"
  options:
    - "EDITOR"
    - "ENVIRONMENT"
    - "SHELL"
    - "SESSION_EDITOR"
  answer: 1
 comment: "A variável de ambiente EDITOR define o editor de texto padrão usado pelo shell e por outros programas (como git, crontab -e, etc.). Para tornar a configuração persistente, o usuário pode adicionar 'export EDITOR=vim' ao seu ~/.bashrc ou ~/.bash_profile. #editor #vim #nano #shell"

- id: "103-104"
  topic: "103.8"
  question: "No editor de textos VI, qual comando deve ser utilizado para posicionar o cursor na última linha de um arquivo, independente de quantas linhas o arquivo possui?"
  options:
    - ":end"
    - "EE"
    - ":!"
    - ":$"
  answer: 4
 comment: "No VI/Vim, o comando :$ posiciona o cursor na última linha do arquivo. Para navegar a linhas específicas: :1 vai à primeira linha, :100 vai à centésima, e assim por diante. O :! é usado para executar comandos do shell sem sair do editor. #vi #vim #editor"

- id: "103-105"
  topic: "103.8"
  question: "Você está no VI, em modo de navegação, e deseja apagar a linha atual e as 20 linhas seguintes. Qual conjunto de teclas pode ser utilizado?"
  options:
    - "d20d"
    - "20dd"
    - "21dd"
    - ":20d"
    - "dd21"
  answer: 3
 comment: "O enunciado pede a linha atual mais as 20 seguintes, totalizando 21 linhas. No VI, Ndd apaga N linhas a partir da posição atual. Portanto, 21dd apaga 21 linhas. O equivalente d21d também funcionaria. O 20dd apagaria apenas 20 linhas, não incluindo todas as necessárias. #vi #vim #dd #editor"

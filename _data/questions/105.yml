- id: "105-039"
  topic: "105.1"
  question: "Das opções abaixo, quais são declarações de função válidas no bash? (Selecione 3 Respostas)"
  options:
    - "function exame () { echo \"Simulado LPIC-1\"; }"
    - "function exame { echo \"Simulado LPIC-1\"; }"
    - "function exame () { echo \"Simulado LPIC-1\" };"
    - "exame() { echo \"Simulado LPIC-1\"; }"
    - "exame { echo \"Simulado LPIC-1\"; }"
  answer: [1, 2, 4]
  comment: "Na declaração de uma função a palavra \"function\" pode ou não ser utilizada, é opcional. Usando o funcion, o uso do () é opcional, mas sem ele é obrigatório, e após isso a sequencia de comando entre {}, cada comando finalizado com o ; #function #bash #scripting #shell"

- id: "105-040"
  topic: "105.2"
  question: "Quais das seguintes opções do comando test podem ser utilizadas para comparações entre valores numéricos? (Selecione 3 Respostas Corretas)"
  options:
    - "-d"
    - "-gt"
    - "-nt"
    - "!="
    - "-le"
  answer: [2, 4, 5]
  comment: "Dentre as opções listadas temos: -d : Verifica se um arquivo existe e é um diretório; -gt : Verifica se o VALOR1 é maior que (greater than) o VALOR2; -nt : Verifica se o Arquivo1 é mais novo que o Arquivo2; = : Verifica se o VALOR1 é diferente que o VALOR2. Também funciona para strings; -le : Verifica se o VALOR1 é menor ou igual (less than or equal) ao VALOR2. #test #operators #bash #scripting"


- id: "105-032"
  topic: "105.2"
  question: "Com relação às instruções condicionais e de loop utilizadas em shell scripts, quais afirmações são verdadeiras? (Selecione 3 Respostas)"
  options:
    - "Na instrução condicional \"if\" do shell script, a condição (verdadeiro ou falso) é determinada pelo código de saída do comando informado após a declaração \"if\"."
    - "A instrução if sempre é utilizada em conjunto com o comando \"test\", mesmo que no formato [ expressão ]."
    - "A instrução \"for i in {1..5}\" atribui à variável $i, em cada loop, um valor de 1 a 5."
    - "A instrução \"until\" atua de forma inversa à instrução \"while\", as instruções são executadas enquanto a expressão informada for falsa."
    - "No shell script, a instrução \"while\" pode ser finalizada apenas com o símbolo }."
  answer: [1, 3, 4]
  comment: "Após a instrução if um comando deve ser informando, podendo ser tanto o comando test para gerar uma condição, quanto um comando normal como um grep por exemplo, a execução desse comando vai gerar um código de saída, 0 é considerado verdadeiro, e diferente de 0 falso. A instrução while executa o loop enquanto a condição informada for verdadeira, a instrução until executa o loop até que a instrução informada seja verdadeira. #if #while #until #for #bash"


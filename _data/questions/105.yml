  comment: "A opção -x além de verificar se o arquivo existe, verifica se possui a permissão de execução, função semelhante das opções -r (read/leitura) e -w (write/escrita). Outras opções importantes para aquivos são -f que verifica se o arquivo existe e se é um arquivo regular (não um diretório ou device) e a opção -e que apenas verifica se o arquivo existe. #test #permissoes #bash #scripting"


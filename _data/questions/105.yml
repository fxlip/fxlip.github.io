- id: "105-009"
  topic: "105.2"
  question: "Qual dos comandos abaixo irá exibir na tela, sem erros de sintaxe, a mensagem 'O arquivo existe' apenas quando o arquivo realmente existir?"
  options:
    - "[ -f /etc/lpi ] || echo 'O arquivo existe'"
    - "[ -f /etc/lpi ] && echo 'O arquivo existe'"
    - "[ -e /etc/lpi ] ; echo 'O arquivo existe'"
    - "[ /etc/lpi ] | echo 'O arquivo existe'"

  answer: 4
  comment: "A opção ListenStream especifica um endereço para que se ouça um stream de dados, normalmente uma porta, mas o IP também pode ser especificado. #systemd #socket #ListenStream"

- id: "110-017"
  topic: "110.2"
  question: "O que é possível determinar a partir da seguinte entrada do arquivo /etc/shadow? (Selecione TRÊS Respostas Corretas)"
  code: "teste2:!$6$eWDJHU5C$OLDNPq/Z6Rf4kY7GQUzzwbJpzJ:17473:0:10:3::::"
  options:
    - "Não foi definida uma descrição, ou nome completo, para o usuário teste2."
    - "O login do usuário está bloqueado."
    - "O usuário deve trocar sua senha a cada 10 dias no máximo."
    - "O usuário só pode trocar sua senha após 3 dias da troca anterior."
    - "O usuário passará a ser alertado 3 dias antes de sua senha expirar."
  answer: [2, 3, 5]
  comment: "O caractere ! à frente da senha em hash do usuário indica que ele está bloqueado. A sequência de informações do arquivo é: login:hash da senha:número de dias da última alteração da senha:mínimo de dias para a troca da senha:máximo de dias em que a mesma senha pode ser mantida:dias em que o usuário será notificado antes da expiração da senha:caso a senha tenha expirado, desabilita a conta após n dias:dias para bloqueio da conta:reservado. #shadow #aging"

- id: "110-018"
  topic: "110.2"
  question: "Qual diretório contém os arquivos de configuração do xinetd?"
  options:
    - "/etc/xinetd.d/"

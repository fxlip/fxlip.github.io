  comment: "Nas configurações de um serviço no arquivo xinetd.conf, ou nos aquivos do /etc/xinetd.d/, o parâmetro \"disable = yes\" fará com que o serviço não seja disponibilizado mesmo que esteja configurado. #xinetd #disable #superserver"

- id: "110-027"
  topic: "110.2"
  question: "Qual dos arquivos abaixo, por padrão, não pode ser lido por nenhum usuário do sistema com exceção do usuário root?"
  options:
    - "/etc/passwd"
    - "/etc/shadow"
    - "/etc/group"
    - "/etc/profile"
  answer: 2
  comment: "Como o arquivo /etc/shadow possui informações referentes à senha dos usuários, o acesso de leitura é restrito apenas ao usuário root. #shadow"

- id: "110-028"
  topic: "110.2"
  question: "A qual serviço/biblioteca estão relacionados os arquivos /etc/hosts.allow e /etc/hosts.deny?"
  options:
    - "TCP Wrapper"
    - "systemd-networkd"
    - "OpenSSH"
    - "GnuPG"
    - "crontab"
  answer: 1
  comment: "Processos podem utilizar a biblioteca do TCP Wrapper (libwrap.a) para realizar um filtro inicial nas conexões ao serviço. Por exemplo, o processo /usr/sbin/tcpd utiliza a biblioteca libwrap. Os arquivos /etc/hosts.allow e /etc/hosts.deny são utilizados para configurar os parâmetros de acesso aos serviços que utilizam essa biblioteca. #TCPWrapper #hosts.allow #hosts.deny"

- id: "110-029"
  topic: "110.3"
  question: "Sobre o modelo de chaves públicas e privadas utilizado em uma conexão SSH, podemos afirmar que: (Selecione TRÊS Respostas Corretas)"
  options:
    - "A chave privada deve ser de posse exclusiva do usuário."
    - "A chave pública é utilizada para criptografar os dados antes de enviá-los."
    - "A chave privada é usada para criptografar os dados durante a comunicação SSH."
    - "O compartilhamento da chave pública pode comprometer a segurança do usuário."
    - "A chave privada é utilizada para descriptografar os dados recebidos."
  answer: [1, 2, 5]
  comment: "A base da comunicação SSH via chave pública e privada é entender que a chave pública é compartilhada com outro usuário que irá utilizá-la para criptografar os dados antes de enviá-lo. A chave privada nunca deve ser compartilhada e ela será utilizada para descriptografar os dados que foram criptografados com a chave pública equivalente. #SSH"

- id: "110-030"
  topic: "110.3"
  question: "Qual arquivo contém a chave RSA privada de um usuário?"
  options:
    - "~/.ssh/id_rsa.pub"
    - "~/.ssh/id_rsa.priv"
    - "~/.ssh/know_hosts"
    - "~/.ssh/id_rsa"
  answer: 4
  comment: "As chaves ficam localizadas no diretório $HOME/.ssh/. No caso de uma chave que usa o algoritmo RSA, o arquivo id_rsa contém a chave privada e o arquivo id_rsa.pub a chave pública. Outros algoritmos (DSA, ECDSA e etc) seguirão o mesmo padrão de nomes. #SSH #id_rsa #RSA"

- id: "110-031"

  comment: "O comando nmap é utilizado para scanear uma máquina local ou remota em busca de Portas abertas, além de outras informações. Também pode ser utilizado para analisar todas as máquinas de uma rede lógica específica. #nmap"

- id: "110-015"
  topic: "110.1"
  question: "Qual comando pode ser utilizado para identificar o PID de um processo com uma conexão TCP aberta?"

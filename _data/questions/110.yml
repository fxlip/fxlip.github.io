    - "~/.ssh/id_rsa.pub"
    - "~/.ssh/id_rsa"
    - "/etc/ssh/ssh_config"
    - "~/.ssh/known_hosts"
  answer: 1
  comment: "A chave púbica compartilhada deverá ser incluída no arquivo authorized_keys do usuário. #SSH #authorized_keys"

- id: "110-020"
  topic: "110.3"
  question: "Qual processo tem a função de armazenar as chaves privadas GPG em memória, de forma que os utilitários do GPG consultem essa informação nesse processo, evitando então a necessidade do usuário informá-las em toda requisição?"
  options:
    - "gpgd"
    - "gpg-agent"
    - "ssh-agent"
    - "gpg-keys"
  answer: 2
  comment: "O gpg-agent é iniciado automaticamente pelos processos do gpg, na primeira execução o acesso às chaves privadas é solicitado, mas após isso as informações são mantidas em memória. #gpg-agent #GPG"

- id: "110-021"
  topic: "110.3"
  question: "Qual arquivo contém as configurações utilizadas pelo cliente SSH?"
  options:
    - "/etc/ssh/client"
    - "/etc/ssh_client"
    - "/etc/ssh/sshd_config"
    - "/etc/ssh/ssh_config"
    - "/etc/ssh/config"
  answer: 4
  comment: "As configurações relacionadas ao cliente SSH devem ser feitas no arquivo /etc/ssh/ssh_config. Já as configurações do Servidor SSH, ou seja no sshd, devem ser feitas no arquivo /etc/ssh/sshd_config. #SSH #ssh_config #sshd_config"

- id: "110-022"
  topic: "110.3"
  question: "Qual opção deve ser definida como \"yes\" no arquivo /etc/ssh/sshd_config para que outra máquina possa acessar o serviço SSH e a interface X utilizando o comando \"ssh -X\"?"
  options:
    - "X11"
    - "X11Enable"
    - "X11Forwarding"
    - "Forwarding"
  answer: 3
  comment: "A opção X11Forwarding habilita o servidor SSH a receber conexões que irão acessar aplicações no Sistema de Janelas X. #X11Forwarding #SSH #X11"

- id: "110-023"
  topic: "110.1"
  question: "Qual comando irá exibir todos os arquivos e diretórios do sistema que possuem o bit SUID ativo?"
  options:
    - "find / -perm -g=s"
    - "find / -perm -4000"
    - "find / -type suid"
    - "find / -perm SUID"
    - "find / -perm -2000"
  answer: 2
  comment: "O código de permissão 4000 é equivalente ao SUID e o 2000 ao SGID. No exame é comum questões sobre pesquisar os arquivos que não possuem nenhum usuário ou grupo associado, nesse caso deve ser utilizado o find da seguinte maneira: find / \\( -nouser -o -nogroup \\) #find #SUID"

- id: "110-024"
  topic: "110.1"
  question: "Qual comando pode ser utilizado para limitar a quantidade de processos que um usuário pode iniciar?"
  options:
    - "lsof"
    - "netstat"
    - "chage"
    - "ulimit"
    - "sudo"
  answer: 4
  comment: "O comando ulimit define na sessão atual limites para utilização dos recursos da máquina como tamanho máximo de arquivos, arquivos abertos, uso de processos, utilização de CPU, memória e etc. #ulimit #limits"

- id: "110-025"

  comment: "O lsof é utilizado para listar os arquivos abertos por processos e com isso é possível obter a informação desejada. O comando netstat também pode ser utilizado para esse fim. #lsof #PID #TCP"

- id: "110-016"
  topic: "110.2"
  question: "No arquivo de configuração de uma Unit do tipo Socket no systemd, qual opção é utilizada para definir em qual IP e Porta o Socket irá escutar?"
  options:

  comment: "O serviço xinetd tem como principal arquivo de configuração o /etc/xinetd.conf mas a maioria das configurações referentes aos serviços são incluídas no diretório /etc/xinetd.d/ #xinetd #superserver"

- id: "110-019"
  topic: "110.3"
  question: "Ao realizar uma configuração de acesso remoto SSH via chaves públicas, sem o uso de senhas, qual arquivo deverá que ser obrigatoriamente alterado manualmente:"

- id: "110-037"
  topic: "110.1"
  question: "Considerando a seguinte saída de comando, podemos afirmar que: (Selecione TRÊS Respostas Corretas)"
  code: |
    # passwd -S usuario1
    usuario1 P 10/12/2021 1 60 7 -1
  options:
    - "A conta está bloqueada."
    - "A data da próxima alteração de senha será 12 de Outubro de 2021."
    - "O usuário deve trocar a senha a cada 2 meses."
    - "A conta não será bloqueada após a expiração da senha."
    - "7 dias antes da expiração da senha o usuário passará a receber avisos do sistema."
  answer: [3, 4, 5]
  comment: "As informações exibidas pelo comando \"passwd -S\" são: Estado da conta (P=Senha OK, NP=Sem Senha, L=Conta Bloqueada (Locked). Data da Última Alteração da Senha. Limite mínimo de dias para a senha. Limite máximo de dias para a senha. Dias de aviso antes da expiração da senha. Tempo após a expiração da senha até a desativação da conta, -1 significa desabilitado. #passwd #aging"

- id: "110-038"
  topic: "110.1"
  type: "discursive"
  question: "Qual comando pode ser utilizado para definir, na sessão atual, o número máximo de processos que um usuário pode executar simultaneamente? (Informe apenas o nome do comando, sem o caminho ou argumentos)"
  answer: "ulimit"
  comment: "O comando ulimit define na sessão atual limites para utilização dos recursos da máquina como tamanho máximo de arquivos, arquivos abertos, uso de processos, utilização de CPU, memória e etc. #ulimit #limits"

- id: "110-039"
  topic: "110.2"
  type: "discursive"
  question: "Uma manutenção está sendo realizada no servidor Linux e o administrador deseja bloquear o login de todos os usuários, exceto root, exibindo a mensagem de \"Sistema em Manutenção\" quando o usuário tentar realizar o login. Qual arquivo deve ser criado com a mensagem desejada para que isso aconteça? (Informe o caminho completo do arquivo.)"
  answer: "/etc/nologin"
  comment: "Quando o arquivo /etc/nologin existe, nenhum usuário, com exceção do root, consegue realizar login no sistema, ao realizar a tentativa a mensagem escrita no arquivo é retornada ao usuário. #nologin #login"

- id: "110-040"
  topic: "110.2"
  question: "Qual é uma permissão válida para o arquivo /etc/shadow?"
  options:
    - "rw-rw-rw-"
    - "rw-rw-r--"
    - "rw-r--r--"
    - "rw-r-----"
  answer: 4
  comment: "Como o arquivo /etc/shadow possui informações referentes à senha dos usuários, o acesso de leitura deve ser restrito apenas ao usuário root. #shadow"

- id: "110-041"
  topic: "110.2"
  question: "Caso o acesso a um serviço a partir de um IP específico esteja configurado tanto no arquivo /etc/hosts.allow, quanto no arquivo /etc/hosts.deny, qual será o comportamento do sistema?"
  options:
    - "O acesso será liberado a partir de qualquer IP."
    - "O acesso a partir do IP informado será bloqueado."
    - "O acesso a partir do IP informado será liberado."
    - "Haverá um conflito e ninguém conseguirá utilizar o serviço."
  answer: 3
  comment: "As configurações do arquivo /etc/hosts.allow são lidas primeiro, e se há uma liberação para o serviço, para um IP ou rede no hosts.allow, o hosts.deny não é nem mesmo consultado. #TCPWrapper #hosts.allow #hosts.deny"

- id: "110-042"
  topic: "110.1"
  question: "O administrador está investigando um incidente de segurança em uma máquina linux e deseja uma lista dos últimos usuários que conectaram no sistema. Qual o melhor comando a ser utilizado?"
  options:
    - "lastlog"
    - "who"
    - "last"
    - "lastb"
  answer: 3
  comment: "O comando last mostra os últimos logins na máquina. O lastlog mostra apenas o último login de cada usuário do sistema. O who exibe os usuários logados no momento e o lastb as últimas ocorrências de falhas no login. #last #lastlog #login"

- id: "110-043"
  topic: "110.1"
  type: "discursive"
  question: "O administrador deseja limitar o número de arquivos que um usuário pode abrir simultaneamente. Em qual arquivo de configuração ele deve fazer essa definição? (Informe o caminho completo do arquivo)"
  answer: "/etc/security/limits.conf"
  comment: "O comando ulimit é utilizado para definir esses limites em uma sessão, mas para configurá-las permanentemente para um usuário deve ser feito pelo arquivo /etc/security/limits.conf #limits.conf #ulimit #limits"

- id: "110-044"
  topic: "110.1"
  question: "Qual comando define a data de expiração da conta usuario1 para 30 de Dezembro de 2021?"
  options:
    - "usermod -e 12/30/2021 usuario1"
    - "chage -I 12/30/2021 usuario1"
    - "passwd -e 12302021 usuario1"
    - "usermod -I 12/30/2021 usuario1"
  answer: 1
  comment: "Nesse caso atenção para a diferença entre expiração de conta e da senha. O comando usermod -e define a data de expiração da conta. O chage -I define a inativação da conta e o passwd -e força a expiração da senha. #usermod #chage"

- id: "110-045"
  topic: "110.2"
  question: "Qual comando tem a função de converter senhas para o formato shadow?"
  options:
    - "pwdconvert"
    - "expand"
    - "pam_conv"
    - "pwconv"
  answer: 4
  comment: "O comando pwconv cria o arquivo /etc/shadow a partir do arquivo /etc/passwd, deixando as senhas no padrão shadow, que é o padrão atual do Linux. #pwconv #shadow"

- id: "110-046"
  topic: "110.1"
  question: "Quais comandos podem ser utilizados para bloquear o acesso a uma conta do sistema? (Selecione TRÊS Respostas Corretas)"
  options:
    - "ulimit"
    - "chage"
    - "usermod"
    - "passwd"
    - "fuser"
  answer: [2, 3, 4]
  comment: "Os comandos chage, usermod e passwd podem ser utilizados para alterar os dados de acesso da conta dos usuários, alterando as propriedades no arquivo /etc/shadow. #chage #usermod #passwd"

- id: "110-047"
  topic: "110.2"
  type: "discursive"
  question: "Qual arquivo contém a informação sobre a data da última alteração de senha de um usuário do sistema? (Informe o caminho completo do arquivo)"
  answer: "/etc/shadow"
  comment: "No arquivo /etc/shadow estão as informações: login:hash da senha:número de dias da última alteração da senha:mínimo de dias para a troca da senha:máximo de dias em que a mesma senha pode ser mantida:dias em que o usuário será notificado antes da expiração da senha:caso a senha tenha expirado, desabilita a conta após n dias:dias para bloqueio da conta:reservado. #shadow #aging"

- id: "110-048"
  topic: "110.2"
  question: "Qual linha de configuração do arquivo /etc/hosts.allow irá liberar o acesso de toda a rede 172.16.10.0/24 apenas ao serviço SSH disponível na máquina?"
  options:
    - "172.16.10.0/24"
    - "ssh 172.16.10.0/24"
    - "ALL: 172.16.10.0/24"
    - "sshd:172.16.10.0/24"
  answer: 4
  comment: "No arquivo /etc/hosts.allow ou hosts.deny, o serviço virá no começo da linha ou é usado ALL para todos, após os : (dois pontos) são listados os IPs ou Redes que podem ou não usar o recurso. #hosts.allow #TCPWrapper #SSH"

- id: "110-049"
  topic: "110.3"
  question: "Em qual arquivo são armazenadas as chaves públicas do gpg que o usuário possui?"
  options:
    - "~/.gnupg/pubring.gpg"
    - "~/.gpg/keys.pub"
    - "~/.ssh/id_rsa.pub"
    - "~/.ssh/public.gpg"
  answer: 1
  comment: "As chaves utilizadas pelo gpg ficam localizadas no diretório $HOME/.gnupg/ e o arquivo pubring.gpg contém as chaves públicas já recebidas pelo usuário. #GPG #pubring"

- id: "110-050"
  topic: "110.3"
  question: "Qual dos seguintes comandos faz com o que o SSH abra uma porta local de número 888 que será redirecionada ao IP 192.168.10.10 na porta 80?"
  options:
    - "ssh -L 888 192.168.10.10:80"
    - "ssh -l 888 -d 192.168.10.10:80"
    - "ssh -L 888 -R 192.168.10.10:80"
    - "ssh -L 888:192.168.10.10:80"
  answer: 4
  comment: "O SSH permite a criação de túneis pelo qual serão enviados os dados de qualquer tipo de serviço. A sintaxe para abrir um túnel é: ssh -L Porta_Local:Endereço_Destino:Porta_Destino #SSH #tunnel #port-forwarding"

- id: "110-051"
  topic: "110.3"
  question: "Qual comando tem a função de gerenciar as chaves SSH de uma sessão permitindo a autenticação sem a necessidade de informar a senha a cada conexão?"
  options:
    - "ssh-add"
    - "ssh-agent"
    - "ssh-keygen"
    - "sshd_config"
    - "ssh-pass"
  answer: 2
  comment: "Com o ssh-agent em execução, na primeira tentativa de acesso ao host remoto, uma senha para acesso às chaves privadas é solicitada, mas após isso as informações são mantidas em memória. #ssh-agent #SSH"

- id: "110-052"
  topic: "110.3"
  type: "discursive"
  question: "Qual arquivo de configuração deve ser editado para se alterar as opções padrão do servidor OpenSSH? (Informe o caminho completo do arquivo)"
  answer: "/etc/ssh/sshd_config"
  comment: "Configurações relacionadas ao servidor SSH devem ser feitas no arquivo /etc/ssh/sshd_config. Configurações relacionadas ao cliente SSH devem ser feitas no arquivo /etc/ssh/ssh_config. #sshd_config #SSH #OpenSSH"


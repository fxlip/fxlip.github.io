    - "D-Bus Machine ID"
  answer: 3
  comment: "Os Guest/Device Drivers são instalados nos Sistemas Operacionais das máquinas virtuais para melhorar sua performance e usabilidade. Como exemplos temos o 'Guest Additions' no VirtualBox e o 'VMware Tools' no VMware. #guest-driver #virtualbox #vmware"

- id: "102-040"
  topic: "102.1"
  question: "Qual comando pode ser utilizado para verificar os pontos de montagem ativos pelo systemd?"
  options:
    - "journalctl list-mounts"
    - "systemctl list-units --type=mount"
    - "systemctl list-mounts"
    - "cat /proc/systemd/mounts"
  answer: 2
  comment: "O systemd representa cada ponto de montagem como uma 'mount unit'. O comando systemctl list-units --type=mount lista todas as unidades de montagem ativas gerenciadas pelo systemd, exibindo o dispositivo, o ponto de montagem e o estado atual. O journalctl é exclusivo para consulta de logs, e os demais comandos não existem. #systemd #systemctl #mount"

- id: "102-041"
  topic: "102.5"
  question: "Em um sistema Red Hat, o pacote novo-software já está instalado. O administrador recebeu o arquivo novo-softwareV2.rpm com uma nova versão. Qual comando deve ser utilizado para atualizar esse pacote a partir desse arquivo rpm?"
  options:
    - "yum update novo-softwareV2.rpm"
    - "rpm -U novo-softwareV2.rpm"
    - "rpm -ivh --force novo-software"
    - "rpm -ivh novo-softwareV2.rpm"
  answer: 2
  comment: "No rpm, a opção -U (upgrade) instala ou atualiza um pacote já existente. A opção -i apenas faz uma nova instalação, sem substituir uma versão anterior. O --force junto com -ivh forçaria a reinstalação sobrescrevendo arquivos, mas não é uma atualização para nova versão. O yum update espera um nome de pacote, não um arquivo .rpm local. #rpm"

- id: "102-042"
  topic: "102.2"
  question: "Analisando o arquivo /boot/grub/menu.lst, você verificou a indicação de ”hd0,3” no parâmetro ”root”. Qual das partições abaixo está sendo indicada?"
  options:
    - "/dev/hda3"
    - "/dev/hda4"
    - "/dev/hdc3"
    - "/dev/hdd3"
  answer: 2
  comment: "No GRUB Legacy (menu.lst), a notação hd0,3 indica o primeiro disco (hd0 = /dev/hda) e a quarta partição (contagem começa em 0, então 3 = 4ª partição). No GRUB2, hd0,3 indicaria a terceira partição do primeiro disco (/dev/hda3), pois a contagem de partições começa em 1. #grub #grub-legacy #menu.lst"

- id: "102-043"
  topic: "102.4"
  type: "discursive"
  question: "Qual ferramenta do Debian pode ser utilizada para reconfigurar um pacote já instalado, permitindo que o administrador selecione novas definições para a instalação? (Informe apenas o nome do comando, sem o caminho ou argumentos)"
  answer: "dpkg-reconfigure"
  comment: "O comando dpkg-reconfigure reexecuta o script de configuração de um pacote já instalado, permitindo redefinir suas opções. Exemplo: dpkg-reconfigure keyboard-configuration para reconfigurar o teclado. #dpkg #dpkg-reconfigure"

- id: "102-044"
  topic: "102.3"
  question: "Qual arquivo do sistema é atualizado após a execução do comando ldconfig?"
  options:
    - "/etc/ldd"
    - "/etc/ld.so.conf"
    - "/lib/ld.so"
    - "/etc/ld.so.cache"
  answer: 4
  comment: ”O comando ldconfig atualiza o cache de bibliotecas compartilhadas em /etc/ld.so.cache, com base nos diretórios definidos em /etc/ld.so.conf e nos arquivos de /etc/ld.so.conf.d/. O cache acelera a localização de bibliotecas em tempo de execução. #ldconfig #ld.so.cache”

- id: "102-045"
  topic: "102.4"
  question: "Qual comando é usado apenas para pesquisar e exibir informações referentes à base de pacotes disponíveis em um sistema Debian?"
  options:
    - "apt-get"
    - "apt-search"
    - "apt-cache"
    - "dpkg"
    - "dpkg-find"
  answer: 3
  comment: "O apt-cache pesquisa a base de pacotes instalados e disponíveis no sistema, sem realizar operações de instalação, remoção ou atualização. Exemplos: apt-cache search <termo> para buscar pacotes e apt-cache show <pacote> para exibir detalhes. O apt-get e dpkg realizam operações sobre pacotes. #apt-cache"

- id: "102-046"
  topic: "102.1"
  question: "Quais dos elementos a seguir são utilizados nas definições de dimensionamento feitas através do LVM? (Selecione TRÊS Respostas Corretas)"
  options:
    - "VG (Volume Group)"
    - "PV (Physical Volume)"
    - "LV (Logical Volume)"
    - "GPT (GUID Partition)"
    - "PG (Physical Group)"
  answer: [1, 2, 3]
  comment: "O LVM (Logical Volume Manager) possui 5 elementos principais: PV (Physical Volume) — disco ou partição física; VG (Volume Group) — agrupamento de PVs; LV (Logical Volume) — volume lógico criado dentro de um VG; PE (Physical Extent) e LE (Logical Extent) — unidades mínimas de alocação. GPT é um esquema de particionamento, não um elemento do LVM. #lvm #pv #vg #lv"

- id: "102-047"
  topic: "102.2"
  question: "Quais comandos podem ser utilizados para atualizar o arquivo de configuração que será utilizado pelo GRUB 2 durante o processo de boot? (Selecione TRÊS Respostas Corretas)"
  options:
    - "grub-mkconfig > /boot/grub/grub.cfg"
    - "grub-mkconfig -o /boot/grub/grub.cfg"
    - "install-grub > /etc/default/grub"
    - "update-grub -o /etc/default/grub"
    - "update-grub > /boot/grub/grub.cfg"
  answer: [1, 2, 5]
  comment: "Os comandos grub-mkconfig e update-grub leem as configurações de /etc/default/grub e /etc/grub.d/* para gerar o arquivo /boot/grub/grub.cfg. Podem ser usados com -o para definir o arquivo de saída ou com redirecionamento (>). O install-grub e update-grub -o /etc/default/grub não são sintaxes válidas. #grub2 #grub-mkconfig #update-grub"

- id: "102-048"
  topic: "102.1"
  question: "Quantas partições primárias um sistema que utiliza o particionamento MBR pode ter?"
  options:
    - "3"
    - "4"
    - "254"
    - "128"
    - "Ilimitado"
  answer: 2
  comment: "O MBR (Master Boot Record) suporta no máximo 4 partições primárias. Uma alternativa comum é usar 3 partições primárias e 1 estendida, dentro da qual são criadas partições lógicas (em quantidade maior). Para discos maiores ou mais partições, recomenda-se o GPT. #mbr"

- id: "102-049"
  topic: "102.4"
  question: "Qual o comando utilizado para atualizar as informações dos repositórios em uma distribuição que utiliza o gerenciamento de pacotes no padrão Debian?"
  options:
    - "apt-get update"
    - "apt-get upgrade"
    - "apt-get dist-upgrade"
    - "dpkg update"
    - "apt list-upgrades"
  answer: 1
  comment: "O apt-get update sincroniza a lista de pacotes disponíveis com os repositórios configurados em /etc/apt/sources.list, mas não instala nem atualiza nenhum pacote. O apt-get upgrade atualiza os pacotes instalados e o dist-upgrade faz o mesmo permitindo remoção de pacotes conflitantes. #apt-get"


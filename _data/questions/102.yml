- id: "102-032"
  topic: "102.2"
  question: "Na tela inicial do processo de boot do GRUB, quais parâmetros podem ser utilizado para forçar a inicialização do sistema em modo de manutenção? (Selecione TRÊS Respostas Corretas)"
  options:
    - "maintenance"
    - "single"
    - "systemd.unit=rescue.target"
    - "mono"
    - "init=/bin/sh"
  answer: [2, 3, 5]
  comment: "Na interface do GRUB é possível incluir uma série de parâmetros que serão utilizados pelo kernel no momento do boot. Para o modo de manutenção, utiliza-se 's', 'single' ou '1'. Outras opções incluem definir um novo init via 'init=/bin/sh' ou indicar ao systemd o 'rescue.target'. #grub #systemd #init"

- id: "102-033"

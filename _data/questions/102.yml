  comment: "Sistemas que utilizam o UEFI como firmare possuem uma partição especial chamada ESP (EFI System Partition), que é montada no diretório /boot/efi/. Nesse diretório estão localizados os bootloaders que serão utilizados no processo de boot. Essa partição deve ser sempre do tipo FAT. #uefi #esp"

- id: "102-030"
  topic: "102.4"
  question: "Em um sistema Debian, em qual arquivo de configuração podem ser encontrados os repositórios de pacotes utilizados pelo APT?"

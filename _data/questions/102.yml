  comment: "No apt-get, a opção “purge” irá remover a aplicação e seus arquivos de configuração, utilizando apenas o “remove” os arquivos de configuração serão mantidos. No dpkg o mesmo recurso é acionado pelas opções -P ou –purge. #apt #dpkg"

- id: "102-029"
  topic: "102.1"
  question: "Em qual diretório é por padrão montada a partição ESP (EFI System Partition)?"
  options:
    - "/boot"
    - "/boot/efi"
    - "/uefi"
    - "/boot/esp"
    - "/efi"

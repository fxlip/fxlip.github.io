  comment: "O arquivo /etc/apt/sources.list contém uma lista de URLs e parâmetros utilizados pelos comandos do APT para verificar e fazer o download de novos pacotes. #apt #sources.list"

- id: "102-031"
  topic: "102.4"
  question: "Quais comandos abaixo podem ser utilizados para exibir os detalhes da instalação do pacote zsh, como a versão, dependências, descrição e etc? (Selecione DUAS Respostas Corretas)"
  options:
    - "apt-get status zsh"
    - "dpkg -L zsh"
    - "dpkg -s zsh"
    - "apt search zsh"
    - "apt-cache show zsh"
  answer: [3, 5]

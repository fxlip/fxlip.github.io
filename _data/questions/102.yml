  options:
    - "zip"
    - "zypper"
    - "rpm"
    - "deb"
    - "tgz"
  answer: 3
  comment: "O zypper é o gerenciador de pacotes rpm utilizado em sistemas OpenSuse. As opções são semelhantes ao yum, porém não iguais. Em geral há uma opção longa, por exemplo “zypper install ksh” ou curta, “zypper in ksh”"

- id: "102-024"
  topic: "102.6"
  question: "Qual recurso tem como principal funcionalidade melhorar a performance e a integração do sistema operacional convidado (guest) em uma máquina virtual?"
  options:
    - "Hypervisor"
    - "Guest Driver"
    - "Host Keys"
    - "KVM"
    - "dbus"
  answer: 2
  comment: "Os Guest/Device Drivers são instalados nos Sistemas Operacionais Convidados (Guests) para melhorar sua performance e usabilidade. Como exemplos temos o “Guest Additions” no VirtualBox e o“Vmware Tools” no VMWare. #guest-driver"

- id: "102-025"
  topic: "102.3"
  question: "Qual variável de ambiente pode ser configurada para definir temporariamente a localização de uma biblioteca no sistema?"
  options:
    - "LD_LIBRARY_PATH"
    - "LD_SO_CACHE"
    - "LIB_PATH"
    - "LD_LIB_PATH"
    - "LIB_SHARE_PATH"
  answer: 1
  comment: "Ao definir e exportar a variável de ambiente LD_LIBRARY_PATH com determinado diretório, ou conjunto deles, as aplicações passarão a buscar pelas bibliotecas nesses diretórios e não apenas nas localizações padrão /lib e /usr/lib. #ldconfig #ld_library_path"

- id: "102-026"
  topic: "102.1"
  type: "discursive"
  question: "Qual ponto de montagem contém por padrão os diretórios e arquivos de cada usuário criado no sistema e por isso há a recomendação de que seja criado em uma partição específica do sistema? (Informe o caminho completo do diretório)"
  answer: "/home"
  comment: "Recomenda-se que o diretório /home seja criado em uma partição distinta pois por possuir os arquivos e diretórios de cada usuários, é importante evitar que estes ocupem todo o espaço disponível do sistema. Além disso a partição separada facilita procedimentos de backup."

- id: "102-027"
  topic: "102.2"
  type: "discursive"
  question: "No GRUB 2, qual o nome do arquivo de configuração que é efetivamente utilizado pelo GRUB 2? (Informe apenas o nome do arquivo, sem o caminho completo)"
  answer: "grub.cfg"
  comment: "As configurações do GRUB podem ser feitas no /etc/default/grub, após o uso dos comandos update-grub ou grub-mkconfig é que o arquivo /boot/grub/grub.cfg será atualizado e então efetivamente utilizado pelo GRUB. O arquivo menu.lst é utilizado pelo GRUB Legacy, não pelo GRUB2. #grub2 #grub.cfg"

- id: "102-028"
  topic: "102.4"
  question: "Em uma distribuição Debian, qual dos comandos abaixo deve ser utilizado para remover o pacote gedit, incluindo todos os seus arquivos de configuração?"
  options:
    - "dpkg -r gedit"
    - "apt-get remove gedit"
    - "apt-get remove –config gedit"
    - "apt-get purge gedit"
    - "apt-get clean gedit"

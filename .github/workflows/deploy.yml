name: system-deploy

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancela build anterior se um novo push chegar antes de terminar
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:

  # ===========================================================================
  # Job 1: Lint + Testes — gateia build e deploy
  # Só usa Node (sem Ruby), é o job mais rápido
  # ===========================================================================
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências Node
        run: npm install

      - name: Lint JS (ESLint — falha em errors, passa em warnings)
        run: npm run lint

      - name: Testes JS (funções puras + DOM)
        run: npm run test:js

      - name: Testes Worker (kill switch, rate limiting, endpoints)
        run: npm run test:worker

  # ===========================================================================
  # Job 2: Build + Validação HTML — só roda se lint e testes passarem
  # Jekyll roda UMA vez; HTMLProofer valida o artefato real de produção
  # ===========================================================================
  build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Build with Jekyll
        run: bundle exec jekyll build --destination ./_site
        env:
          JEKYLL_ENV: production

      - name: HTMLProofer — valida links e HTML do artefato de produção
        run: bundle exec ruby scripts/htmlproofer.rb ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  # ===========================================================================
  # Job 3: Deploy — só roda após build aprovado
  # ===========================================================================
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

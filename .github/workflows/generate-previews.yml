name: generate-link-previews

on:
  push:
    branches: [ master, main ]
    paths:
      - "_posts/**"
      - "_root/**"
  workflow_dispatch:

# Evita conflitos de commit quando múltiplos pushes chegam juntos
concurrency:
  group: "generate-previews"
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Gerar previews
        run: bundle exec ruby scripts/generate_previews.rb

      - name: Commit e push previews.yml
        run: |
          if [ -n "$(git status --porcelain _data/previews.yml)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "actions@github.com"
            git add _data/previews.yml
            git commit -m "chore: update link previews"
            git push
          else
            echo "Nenhuma alteração em _data/previews.yml"
          fi

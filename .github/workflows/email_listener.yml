name: email-listener-protocol

on:
  repository_dispatch:
    types: [incoming-email]
  schedule:
    - cron: '0 * * * *' # Checagem a cada hora
  workflow_dispatch:

# Evita execuções sobrepostas (dois crons simultâneos, por ex.)
concurrency:
  group: "email-listener"
  cancel-in-progress: false  # Não cancelar em progresso — pode perder e-mails

jobs:
  check_emails_and_generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RW_TOKEN }}
          persist-credentials: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      - name: Instalar dependências dos scripts
        run: bundle install
        env:
          BUNDLE_GEMFILE: scripts/Gemfile

      - name: Run Protocol (Email + Previews + Sync)
        env:
          BUNDLE_GEMFILE: ${{ github.workspace }}/scripts/Gemfile
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          ALLOWED_SENDER: ${{ secrets.ALLOWED_SENDER }}
          ADMIN_TOKEN:    ${{ secrets.ADMIN_TOKEN }}
          WORKER_URL:     "https://fxlip-visitor-api.fxlip.workers.dev"
          TZ: 'America/Sao_Paulo'
        run: |
          echo ">>> 1. Verificando E-mails..."
          bundle exec ruby scripts/email_to_post.rb

          echo ">>> 2. Atualizando Link Cards..."
          bundle exec ruby scripts/generate_previews.rb

          echo ">>> 3. Sincronizando Visitantes..."
          bundle exec ruby scripts/sync_visitors.rb

      - name: Commit and Push
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          git config user.name "kernel-bot"
          git config user.email "bot@fxlip.com"

          git add _posts/ _root/ _data/previews.yml _data/visitors.yml files/

          if git diff --staged --quiet; then
            echo "Nenhuma alteração detectada. Encerrando."
          else
            if git diff --staged --name-only | grep -q "^_root/"; then
               MSG="new content via smtp"
            elif git diff --staged --name-only | grep -q "^files/"; then
               MSG="new asset via smtp"
            else
               MSG="auto-update via smtp"
            fi

            echo "Committing: $MSG"
            git commit -m "$MSG"
            git push

            echo ">>> Disparando Pings..."
            bundle exec ruby scripts/index_now.rb || echo "WARNING: IndexNow falhou, mas o deploy segue vivo."
          fi
        env:
          BUNDLE_GEMFILE: ${{ github.workspace }}/scripts/Gemfile
